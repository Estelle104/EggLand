<!DOCTYPE html>
<html lang="fr" 
      xmlns:th="http://www.thymeleaf.org" 
      layout:decorate="~{fragments/layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation - Chiffre d'Affaires</title>
    <style>
        .page-header { margin-bottom: 24px; }
        .page-header h2 { color: var(--text); font-size: 22px; }

        .card-sim { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px; }

        .sim-form { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
        .sim-form .form-group { display: flex; flex-direction: column; gap: 4px; }
        .sim-form label { font-size: 13px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
        .sim-form input { padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; transition: 0.2s; }
        .sim-form input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(184,122,42,0.15); }
        .sim-form input[readonly] { background: var(--bg); color: var(--text-light); cursor: not-allowed; }
        .sim-form button { padding: 10px 24px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .sim-form button:hover { background: var(--hover); transform: translateY(-1px); }

        .resultats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 20px; }
        .result-card { padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); text-align: center; }
        .result-card .label { font-size: 12px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .result-card .value { font-size: 22px; font-weight: 700; }
        .result-card.ca { border-color: var(--primary); }
        .result-card.ca .value { color: var(--primary); }
        .result-card.depense { border-color: var(--danger); }
        .result-card.depense .value { color: var(--danger); }
        .result-card.benefice { border-color: var(--success); }
        .result-card.benefice .value { color: var(--success); }
    </style>
</head>
<body>
    <div layout:fragment="content">

        <div class="page-header">
            <h2>Simulation Chiffre d'Affaires</h2>
        </div>

        <div class="card-sim">
            <form class="sim-form" th:action="@{/simulation/chiffre-affaire}" method="post">
                <div class="form-group">
                    <label>Du</label>
                    <input type="date" name="dateDebut" th:value="${dateDebut}" readonly>
                </div>
                <div class="form-group">
                    <label>Au</label>
                    <input type="date" name="dateFin" th:value="${dateFin}" required>
                </div>
                <button type="submit">
                    <i class="fa-solid fa-chart-line"></i> Simuler
                </button>
            </form>
        </div>

        <div th:if="${chiffreAffaires != null}" class="resultats">
            <div class="result-card ca">
                <div class="label">Chiffre d'Affaires</div>
                <div class="value" th:text="${#numbers.formatDecimal(chiffreAffaires, 0, 'COMMA', 2, 'POINT')} + ' Ar'"></div>
            </div>
            <div class="result-card depense">
                <div class="label">Dépense Nourriture</div>
                <div class="value" th:text="${#numbers.formatDecimal(depenseNourriture, 0, 'COMMA', 2, 'POINT')} + ' Ar'"></div>
            </div>
            <div class="result-card benefice">
                <div class="label">Bénéfice Net</div>
                <div class="value" th:text="${#numbers.formatDecimal(beneficeNet, 0, 'COMMA', 2, 'POINT')} + ' Ar'"></div>
            </div>
        </div>

    </div>
</body>
</html>
