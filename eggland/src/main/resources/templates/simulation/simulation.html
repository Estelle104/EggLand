<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{fragments/layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation - Eggland</title>
    <link rel="stylesheet" th:href="@{/css/simulation.css}">
</head>

<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h2>Simulation</h2>
        </div>

        <!-- SIMULATION DE PRODUCTION -->
        <div class="simulation-card">
            <h3>Simulation de production</h3>
            <form th:action="@{/simulation}" method="post" class="simulation-form">
                <div class="form-group">
                    <label for="date">Date :</label>
                    <input type="date" id="date" name="date" required>
                </div>
                <div class="form-group">
                    <label for="prixUnitaire">Prix unitaire :</label>
                    <input type="number" id="prixUnitaire" name="prixUnitaire" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="nbOeufs">Nombre d'oeufs :</label>
                    <input type="number" id="nbOeufs" name="nbOeufs" min="0" required>
                </div>
                <button type="submit" class="btn-simuler">Simuler</button>
            </form>

            <div th:if="${resultat != null}" class="resultats" style="grid-template-columns: 1fr; margin-top: 24px;">
                <div class="result-card ca">
                    <div class="label">Chiffre d'Affaires Estimé</div>
                    <div class="value" th:text="${#numbers.formatDecimal(resultat, 0, 'COMMA', 2, 'POINT')} + ' Ar'"></div>
                </div>
            </div>
        </div>

        <!-- SIMULATION DE MORTALITÉ -->
        <div class="simulation-card" style="margin-top: 30px;">
            <h3>Simulation de mortalité</h3>

            <div th:if="${erreur != null}" class="alert alert-danger">
                <p th:text="${erreur}"></p>
            </div>

            <form th:action="@{/simulation/mortalite}" method="post" class="simulation-form" id="mortaliteForm">
                <!-- Sélection du lot -->
                <div class="form-group">
                    <label for="lotId">Lot :</label>
                    <select id="lotId" name="lotId" required>
                        <option value="">Sélectionner un lot</option>
                        <option th:each="lot : ${lots}" th:value="${lot.id}"
                            th:text="${lot.race.nom} + ' - ' + ${lot.nombreInitial} + ' poules'">
                        </option>
                    </select>
                </div>

                <!-- Races avec cases à cocher et champs de nombre -->
                <div class="form-group">
                    <label>Nombre de morts par jour par race :</label>
                    
                    <div th:each="race : ${races}" style="margin: 10px 0; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; background: #f9f9f9;">
                        <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                            <!-- Case à cocher -->
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <input type="checkbox" 
                                       th:id="'race_' + ${race.id}" 
                                       th:value="${race.id}"
                                       name="raceIds"
                                       style="width: 18px; height: 18px; cursor: pointer;"/>
                                <label th:for="'race_' + ${race.id}" 
                                       th:text="${race.nom}" 
                                       style="font-weight: 500; cursor: pointer;">
                                </label>
                                <span style="color: #888; font-size: 12px;">
                                    (Rendement: <span th:text="${race.rendementMoyenMois}"></span>/mois)
                                </span>
                            </div>
                            
                            <!-- Champ nombre de morts -->
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <label th:for="'morts_' + ${race.id}" style="font-size: 13px; color: #555;">
                                    Morts/jour :
                                </label>
                                <input type="number" 
                                       th:id="'morts_' + ${race.id}"
                                       th:name="'mortsParRace_' + ${race.id}"
                                       min="0" 
                                       step="1"
                                       placeholder="0"
                                       style="width: 80px; padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px;"/>
                            </div>
                        </div>
                    </div>
                    
                    <!-- <small style="display: block; color: #666; margin-top: 5px; font-style: italic;">
                        (Cochez une race et entrez le nombre de morts par jour pour cette race)
                    </small> -->
                </div>

                <!-- Date de simulation -->
                <div class="form-group">
                    <label for="dateSimulation">Date de simulation :</label>
                    <input type="date" id="dateSimulation" name="dateSimulation" 
                           th:value="${dateDebut}" required>
                </div>

                <button type="submit" class="btn-simuler">Simuler</button>
            </form>

            <!-- Résultats -->
            <div th:if="${resultatMortalite != null}" class="resultats-container" style="margin-top: 24px;">
                <h3 style="font-size: 15px; color: var(--text); margin: 0 0 12px 0;">Résultats de la simulation de mortalité</h3>
                
                <div class="resultats" style="grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-top: 0;">
                    <div class="result-card ca">
                        <div class="label">CA après mortalité</div>
                        <div class="value" th:text="${#numbers.formatDecimal(resultatMortalite.chiffreAffaire, 0, 'COMMA', 2, 'POINT')} + ' Ar'"></div>
                    </div>
                    <div class="result-card benefice">
                        <div class="label">Œufs restants</div>
                        <div class="value" th:text="${resultatMortalite.nbOeufsRestants}"></div>
                    </div>
                    <div class="result-card depense">
                        <div class="label">Morts total</div>
                        <div class="value" th:text="${resultatMortalite.totalMorts}"></div>
                    </div>
                </div>
                
                <!-- Détail des morts par race -->
                <div th:if="${resultatMortalite.mortsParRace != null and !resultatMortalite.mortsParRace.isEmpty()}" style="margin-top: 16px;">
                    <h4 style="font-size: 12px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 8px 0;">Détail des morts par race :</h4>
                    <ul class="morts-detail-list" style="margin: 0;">
                        <li th:each="entry : ${resultatMortalite.mortsParRace}">
                            <span th:text="${entry.key} + ' : ' + ${entry.value} + ' morts'"></span>
                        </li>
                    </ul>
                </div>

                <p th:if="${resultatMortalite.message != null}" class="message-avertissement" th:text="${resultatMortalite.message}"></p>
            </div>
        </div>
    </div>

    <!-- JavaScript simple pour la validation -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('mortaliteForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    const checkboxes = document.querySelectorAll('input[name="raceIds"]:checked');
                    
                    if (checkboxes.length === 0) {
                        e.preventDefault();
                        alert('Veuillez cocher au moins une race.');
                        return false;
                    }
                    
                    let hasMorts = false;
                    checkboxes.forEach(function(checkbox) {
                        const raceId = checkbox.value;
                        const input = document.getElementById('morts_' + raceId);
                        if (input && parseInt(input.value) > 0) {
                            hasMorts = true;
                        }
                    });
                    
                    if (!hasMorts) {
                        e.preventDefault();
                        alert('Veuillez entrer un nombre de morts par jour supérieur à 0 pour au moins une race cochée.');
                        return false;
                    }
                });
            }
        });
    </script>
</body>

</html>
