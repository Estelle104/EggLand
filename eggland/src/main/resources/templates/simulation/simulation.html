<!DOCTYPE html>
<html lang="en"
 xmlns:th="http://www.thymeleaf.org"
 layout:decorate="~{fragments/layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/simulation.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>
<div layout:fragment="content">


    <div class="app">
        <div class="main">
            <div class="content">
                <div class="page-header">
                    <h2>Simulation</h2>
                </div>

                <div class="simulation-card">
                    <form th:action="@{/simulation}" method="post" class="simulation-form">
                        <div class="form-group">
                            <label for="date">Date :</label>
                            <input type="date" id="date" name="date" required>
                        </div>
                        <div class="form-group">
                            <label for="prixUnitaire">Prix unitaire :</label>
                            <input type="number" id="prixUnitaire" name="prixUnitaire" min="0" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="nbOeufs">Nombre d'œufs :</label>
                            <input type="number" id="nbOeufs" name="nbOeufs" min="0" required>
                        </div>
                        <button type="submit" class="btn-simuler">Simuler</button>
                    </form>

                    <div th:if="${resultat != null}" class="simulation-result">
                        <h3>Résultat de la simulation :</h3>
                        <p th:text="'Chiffre d affaire : ' + ${resultat} + ' Ar'"></p>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</div>
</body>
</html>
