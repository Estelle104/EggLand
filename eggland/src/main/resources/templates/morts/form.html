<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mort.id == null} ? 'Nouvelle mortalité' : 'Modifier la mortalité'">
        Mortalité - EggLand
    </title>

    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        .page-header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .page-header h2 {
            color: var(--text);
            font-size: 22px;
            margin: 0;
        }

        .page-header .btn-link {
            background: var(--primary);
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .page-header .btn-link:hover {
            background: var(--hover);
        }

        .card-form {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px;
            max-width: 700px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: var(--bg);
            outline: none;
            transition: 0.2s;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(184, 122, 42, 0.15);
            background: white;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn-enregistrer {
            background: var(--primary);
            color: white;
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-enregistrer:hover {
            background: var(--hover);
        }

        .btn-annuler {
            background: var(--border);
            color: var(--text);
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-annuler:hover {
            background: #d4c4b0;
            color: var(--text);
        }
    </style>
</head>

<body>
<div class="app">

    <div th:replace="fragments/sidebar :: sidebar"></div>

    <div class="main">

        <div th:replace="fragments/header :: header"></div>

        <div class="content">

            <div class="page-header">
                <h2 th:text="${mort.id == null} ? 'Insertion de mort' : 'Modification de mort'"></h2>
                <a href="/morts" class="btn-link">
                    <i class="fas fa-list"></i> Liste
                </a>
            </div>

            <div class="card-form">
                <form th:action="@{/morts/save}"
                      th:object="${mort}"
                      method="post">

                    <div class="form-group">
                        <label>Lot</label>
                        <select th:field="*{lot}" required>
                            <option value="">-- Choisir un lot --</option>
                            <option th:each="lot : ${lots}"
                                    th:value="${lot.id}"
                                    th:text="'Lot #' + ${lot.id}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Date</label>
                        <input type="date"
                               th:field="*{date}"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Nombre de morts</label>
                        <input type="number"
                               min="1"
                               th:field="*{nombre}"
                               required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-enregistrer">
                            <i class="fas fa-save"></i> Enregistrer
                        </button>
                        <a href="/morts" class="btn-annuler">
                            <i class="fas fa-times"></i> Annuler
                        </a>
                    </div>

                </form>
            </div>

        </div>

    </div>

</div>
</body>

</html>
