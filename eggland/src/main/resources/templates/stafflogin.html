<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Espace Staff - EggLand</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <style>
        :root {
            --dark: #46220E;
            --deep-brown: #93441A;
            --card-brown: #B67332;
            --cream: #EEE6D8;
        }

        body {
            background-color: var(--light-bg);
            color: var(--cream);
        }

        .staff-card {
            border-top: 5px solid var(--dark);
            border-radius: 0.5rem;
        }

        .btn-staff {
            background-color: var(--dark);
            color: #ffffff;
        }

        .btn-staff:hover {
            background-color: var(--deep-brown);
            color: var(--cream);
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm p-4 staff-card">
                <div class="text-center mb-4">
                    <h4 class="fw-bold">Accès Administration</h4>
                    <p class="text-muted small">Espace réservé au personnel</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger p-2 small">
                    Email ou mot de passe invalide.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Email professionnel</label>
                        <input type="email" id="username" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Mot de passe</label>
                        <input type="password" id="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-staff w-100 shadow-sm">Connexion Sécurisée</button>
                </form>

                <div class="text-center mt-3">
                    <a th:href="@{/}" class="text-decoration-none small text-secondary">Retour au site public</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
