<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients - Eggland</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        .section-title { font-size: 16px; font-weight: 700; color: var(--text); margin: 24px 0 12px; display: flex; align-items: center; gap: 8px; }
        .section-title .count-badge { background: var(--primary); color: #fff; font-size: 12px; padding: 2px 10px; border-radius: 999px; }
        .badge-actif { background: #d4edda; color: #0f5132; }
        .badge-inactif { background: #f1ece3; color: #7C6758; }
        .badge-en_attente { background: #ffe8a1; color: #7a5d00; }
        .btn-accepter { background: #28a745; color: #fff; padding: 6px 12px; border-radius: 6px; border: none; font-size: 12px; cursor: pointer; }
        .btn-accepter:hover { background: #1e7e34; }
        .btn-refuser { background: #e47373; color: #fff; padding: 6px 12px; border-radius: 6px; border: none; font-size: 12px; cursor: pointer; }
        .btn-refuser:hover { background: #cc5a5a; }
    </style>
</head>
<body>
<div class="app">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <div class="main">
        <div th:replace="fragments/header :: header"></div>
        <div class="content">

            <div th:if="${success}" class="alert alert-success">
                <i class="fa-solid fa-check-circle"></i> <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger">
                <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
            </div>

            <div class="page-header">
                <h2>Gestion des clients</h2>
            </div>

            <!-- Section : En attente -->
            <div class="section-title">
                <i class="fa-solid fa-clock"></i> Demandes en attente
                <span class="count-badge" th:text="${nbEnAttente}">0</span>
            </div>

            <div class="card" th:if="${not #lists.isEmpty(enAttente)}" style="margin-bottom:24px;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Email</th>
                            <th>Téléphone</th>
                            <th>Date inscription</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${enAttente}">
                            <td th:text="${c.id}"></td>
                            <td th:text="${c.nom}"></td>
                            <td th:text="${c.prenom}"></td>
                            <td th:text="${c.email}"></td>
                            <td th:text="${c.tel}"></td>
                            <td th:text="${#temporals.format(c.dateInscription, 'dd/MM/yyyy')}"></td>
                            <td>
                                <div style="display:flex; gap:6px;">
                                    <form th:action="@{/admin/clients/accepter}" method="post" style="margin:0;">
                                        <input type="hidden" name="id" th:value="${c.id}" />
                                        <button type="submit" class="btn-accepter"><i class="fa-solid fa-check"></i> Accepter</button>
                                    </form>
                                    <form th:action="@{/admin/clients/refuser}" method="post" style="margin:0;">
                                        <input type="hidden" name="id" th:value="${c.id}" />
                                        <button type="submit" class="btn-refuser"><i class="fa-solid fa-xmark"></i> Refuser</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(enAttente)}" class="card" style="margin-bottom:24px;">
                <div class="vide-message">
                    <i class="fa-solid fa-check-circle" style="color:#28a745;"></i>
                    Aucune demande en attente.
                </div>
            </div>

            <!-- Section : Tous les clients -->
            <div class="section-title">
                <i class="fa-solid fa-users"></i> Tous les clients
            </div>

            <div class="card">
                <div th:if="${#lists.isEmpty(clients)}" class="vide-message">
                    <i class="fa-solid fa-users"></i>
                    Aucun client enregistré.
                </div>
                <table th:if="${not #lists.isEmpty(clients)}">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Email</th>
                            <th>Téléphone</th>
                            <th>Date inscription</th>
                            <th>Statut</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${clients}">
                            <td th:text="${c.id}"></td>
                            <td th:text="${c.nom}"></td>
                            <td th:text="${c.prenom}"></td>
                            <td th:text="${c.email}"></td>
                            <td th:text="${c.tel}"></td>
                            <td th:text="${#temporals.format(c.dateInscription, 'dd/MM/yyyy')}"></td>
                            <td>
                                <span class="badge" th:classappend="${'badge-' + c.statut.code}" th:text="${c.statut.code}"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>
</body>
</html>
