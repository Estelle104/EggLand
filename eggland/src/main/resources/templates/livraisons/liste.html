<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{fragments/layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livraisons - Eggland</title>
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/listeLivraison.css}">
</head>

<body>
    <div layout:fragment="content">

        <!-- Messages flash -->
        <div th:if="${success}" class="alert alert-success">
            <i class="fa-solid fa-check-circle"></i>
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:text="${error}"></span>
        </div>

        <div class="page-header">
            <h2 th:text="${pageTitle}">Livraisons</h2>
            <div style="display: flex; gap: 8px; align-items: center;">
                <form th:action="@{/admin/finance/export/pdf/bon-livraison}" method="get" target="_blank"
                    style="margin:0; display:flex; gap:6px; align-items:center;">
                    <input type="date" name="date" th:value="${today}" class="form-control form-control-sm"
                        style="width:150px;">
                    <button type="submit" class="btn-primary" style="padding:8px 14px; font-size:13px; margin:0;">
                        <i class="fa-solid fa-file-pdf"></i> PDF
                    </button>
                </form>
                <a class="btn-primary" th:href="@{/admin/livraisons/creation}" style="margin:0;">
                    <i class="fa-solid fa-truck-fast"></i> Nouvelle livraison
                </a>
            </div>
        </div>

        <!-- Filtre par date et client -->
        <div class="filtre-card">
            <form class="filtre-form" th:action="@{/admin/livraisons}" method="get">
                <div class="filtre-group">
                    <label><i class="fa-solid fa-user"></i> Nom du client</label>
                    <input type="text" name="nomClient" th:value="${nomClientSelectionne}"
                        placeholder="Rechercher par nom du client" autocomplete="off" />
                </div>
                <div class="filtre-group">
                    <label><i class="fa-solid fa-calendar-day"></i> Date début</label>
                    <input type="date" name="dateDebut" th:value="${dateDebutSelectionnee}" />
                </div>
                <div class="filtre-group">
                    <label><i class="fa-solid fa-calendar-day"></i> Date fin</label>
                    <input type="date" name="dateFin" th:value="${dateFinSelectionnee}" />
                </div>
                <div class="filtre-actions">
                    <button type="submit" class="btn-filtrer">
                        <i class="fa-solid fa-filter"></i> Filtrer
                    </button>
                    <a th:href="@{/admin/livraisons}" class="btn-reset">
                        <i class="fa-solid fa-undo"></i> Réinitialiser
                    </a>
                </div>
            </form>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Client</th>
                        <th>Vente</th>
                        <th>Adresse</th>
                        <th>Date</th>
                        <th>Frais</th>
                        <th>Statut</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="livraison : ${livraisons}">
                        <td th:text="${livraison.id}"></td>
                        <td th:text="${livraison.client.nom}"></td>
                        <td th:text="${'Vente #' + livraison.vente.id}"></td>
                        <td th:text="${livraison.adresseLivraison}"></td>
                        <td th:text="${#temporals.format(livraison.dateLivraison, 'dd/MM/yyyy')}"></td>
                        <td th:text="${#numbers.formatDecimal(livraison.fraisLivraison, 0, 'WHITESPACE', 2, 'COMMA')} + ' Ar'">
                        </td>
                        <td>
                           
                            <span th:if="${livraison.statut.code == 'livre'}" 
                                  class="badge badge-livre">
                                <i class="fa-solid fa-check-circle"></i> Livré
                            </span>

                           
                            <form th:unless="${livraison.statut.code == 'livre'}" 
                                  th:action="@{/admin/livraisons/changerStatut}" method="post"
                                  style="margin:0; display:inline-flex; align-items:center; gap:4px;">
                                <input type="hidden" name="id" th:value="${livraison.id}">
                                <select name="statutCode" class="form-select form-select-sm" style="width:120px; padding:4px 8px; font-size:12px; border-radius:4px; border:1px solid #ced4da;">
                                    <option value="en_attente" th:selected="${livraison.statut.code == 'en_attente'}">En attente</option>
                                    <option value="en_cours" th:selected="${livraison.statut.code == 'en_cours'}">En cours</option>
                                    <option value="livre" th:selected="${livraison.statut.code == 'livre'}">Livré</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-primary" style="padding:4px 10px; font-size:12px; border-radius:4px; background:#2c3e50; color:white; border:none; cursor:pointer;">
                                    <i class="fa-solid fa-check"></i>
                                </button>
                            </form>
                        </td>
                        <td>
                            <div style="display: flex; gap: 6px; align-items: center; flex-wrap: wrap;">
                                <a th:href="@{/admin/livraisons/detail/{id}(id=${livraison.id})}"
                                   class="btn-detail-liv" title="Voir détail">
                                    <i class="fa-solid fa-eye"></i>
                                </a>
                               
                                <form th:action="@{/admin/livraisons/supprimer}" method="post" style="margin:0;"
                                      th:if="${livraison.statut.code != 'livre'}"
                                      onsubmit="return confirm('Supprimer cette livraison ? Cette action est irréversible.')">
                                    <input type="hidden" name="id" th:value="${livraison.id}" />
                                    <button type="submit" class="btn-supp-liv" title="Supprimer">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </form>
                               
                                <span th:if="${livraison.statut.code == 'livre'}" 
                                      style="font-size:12px; color:#6c757d; font-style:italic;">
                                    <i class="fa-solid fa-lock"></i> Verrouillé
                                </span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:replace="~{fragments/pagination :: pager(currentPage=${currentPage}, totalPages=${totalPages}, size=${size}, url=${baseUrl}, filters=${filtres})}">
            </div>
            <div th:if="${#lists.isEmpty(livraisons)}" class="vide-message">
                <i class="fa-solid fa-truck"></i>
                Aucune livraison enregistrée.
            </div>
        </div>
    </div>
</body>

</html>
