<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{fragments/layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail de la livraison</title>
    <link rel="stylesheet" th:href="@{/css/vente.css}">
</head>

<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h2>
                <i class="fa-solid fa-truck"></i>
                Détail de la livraison <span th:text="'#' + ${livraison.id}"></span>
            </h2>
        </div>

        <div class="card detail-page">
            <div class="detail-info-grid">
                <div class="detail-info-item">
                    <span class="detail-info-label">Client</span>
                    <span class="detail-info-value"
                        th:text="${livraison.client != null ? livraison.client.nom : '-'}"></span>
                </div>
                <div class="detail-info-item">
                    <span class="detail-info-label">Vente</span>
                    <span class="detail-info-value"
                        th:text="${livraison.vente != null ? '#' + livraison.vente.id : '-'}"></span>
                </div>
                <div class="detail-info-item">
                    <span class="detail-info-label">Date de livraison</span>
                    <span class="detail-info-value"
                        th:text="${livraison.dateLivraison != null ? #temporals.format(livraison.dateLivraison,'dd/MM/yyyy') : '-'}"></span>
                </div>
                <div class="detail-info-item">
                    <span class="detail-info-label">Statut</span>
                    <span class="badge" th:if="${livraison.statut != null}"
                        th:classappend="${livraison.statut.code == 'livre'} ? ' badge-green' : ' badge-yellow'"
                        th:text="${livraison.statut.code}"></span>
                    <span class="badge badge-gray" th:if="${livraison.statut == null}">N/A</span>
                </div>
                <div class="detail-info-item">
                    <span class="detail-info-label">Adresse</span>
                    <span class="detail-info-value"
                        th:text="${livraison.adresseLivraison != null && !livraison.adresseLivraison.isBlank() ? livraison.adresseLivraison : '-'}"></span>
                </div>
                <div class="detail-info-item">
                    <span class="detail-info-label">Frais de livraison</span>
                    <span class="detail-info-value"
                        th:text="${livraison.fraisLivraison != null ? #numbers.formatDecimal(livraison.fraisLivraison, 0, 'COMMA', 2, 'POINT') + ' Ar' : '-'}"></span>
                </div>
                <div class="detail-info-item">
                    <span class="detail-info-label">Total produits</span>
                    <span class="detail-info-value detail-total"
                        th:text="${#numbers.formatDecimal(totalProduits, 0, 'COMMA', 2, 'POINT')} + ' Ar'"></span>
                </div>
            </div>

            <h4 class="detail-section-title">Produits de la livraison</h4>
            <table class="detail-table">
                <thead>
                    <tr>
                        <th>Produit</th>
                        <th>Quantité</th>
                        <th>Prix unitaire</th>
                        <th>Sous-total</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(details)}">
                        <td colspan="4" style="text-align:center; color: var(--text-light);">
                            Aucun produit disponible
                        </td>
                    </tr>
                    <tr th:each="d : ${details}">
                        <td th:text="${d.produit != null ? d.produit.code : '-'}"></td>
                        <td th:text="${#numbers.formatDecimal(d.quantite, 0, 'COMMA', 2, 'POINT')}"></td>
                        <td th:text="${#numbers.formatDecimal(d.prixUnitaire, 0, 'COMMA', 2, 'POINT')} + ' Ar'"></td>
                        <td
                            th:text="${#numbers.formatDecimal(d.quantite.multiply(d.prixUnitaire), 0, 'COMMA', 2, 'POINT')} + ' Ar'">
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="form-actions">
                <a th:href="@{/admin/livraisons}" class="btn-annuler">
                    <i class="fa-solid fa-arrow-left"></i> Retour à la liste
                </a>
            </div>
        </div>
    </div>
</body>

</html>
