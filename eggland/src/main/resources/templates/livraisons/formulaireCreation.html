<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer une livraison</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/creationLivraison.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
</head>
<body>
<div class="app">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <div class="main">
        <div th:replace="fragments/header :: header"></div>
        <div class="content">

            <div class="page-header">
                <h2>Créer une livraison</h2>
            </div>

            <div class="card-form">
                <form th:action="@{/admin/livraisons/save}" method="post">

                    <div class="form-group">
                        <label>Nom du client</label>
                        <input type="text" name="clientNom" value="" placeholder="Saisir le nom du client" required />
                    </div>

                    <div class="form-group">
                        <label>Type de vente (non livrées)</label>
                        <select name="venteId" required>
                            <option value="">Sélectionner une vente</option>
                            <th:block th:each="vente : ${ventesNonLivrees}">
                                <option th:value="${vente.id}" th:text="${vente.id + ' - ' + vente.client.nom + ' - ' + #temporals.format(vente.date, 'dd/MM/yyyy') + ' - ' + vente.total}"></option>
                            </th:block>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Date de livraison</label>
                        <input type="date" name="dateLivraison" th:value="${#temporals.format(T(java.time.LocalDate).now(), 'yyyy-MM-dd')}" required />
                    </div>

                    <div class="form-group">
                        <label>Adresse de livraison</label>
                        <textarea name="adresseLivraison" rows="3" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Frais de livraison</label>
                        <input type="number" step="0.01" min="0" name="fraisLivraison" value="0.00" required />
                    </div>

                    <div class="form-group">
                        <label>Statut</label>
                        <select name="statutCode" required>
                            <option value="">Sélectionner un statut</option>
                            <th:block th:each="statut : ${statutsLivraison}">
                                <option th:value="${statut.code}"
                                        th:text="${statut.code}"
                                        th:selected="${statut.code == 'en_attente'}"></option>
                            </th:block>
                        </select>
                        <small style="color: #666; font-size: 12px;">Défini lors de la création de la livraison.</small>
                    </div>

                    <div class="form-actions">
                        <a th:href="@{/admin/livraisons}" class="btn-secondary">Retour</a>
                        <button type="submit" class="btn-primary">Enregistrer</button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>
</body>
</html>
