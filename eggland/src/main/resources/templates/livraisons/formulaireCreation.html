<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{fragments/layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer une livraison</title>
    <link rel="stylesheet" th:href="@{/css/creationLivraison.css}">

</head>

<body>
    <div layout:fragment="content">

        <div class="page-header">
            <h2>Créer une livraison</h2>
        </div>

        <div class="card-form">
            <form th:action="@{/admin/livraisons/save}" method="post">

                <div class="form-group">
                    <label>Type de vente (non livrées)</label>
                    <select name="venteId" id="venteSelect" required>
                        <option value="">Sélectionner une vente</option>
                        <th:block th:each="vente : ${ventesNonLivrees}">
                            <option th:value="${vente.id}"
                                th:data-date-vente="${#temporals.format(vente.date, 'yyyy-MM-dd')}"
                                th:text="${vente.id + ' - ' + vente.client.nom + ' - ' + #temporals.format(vente.date, 'dd/MM/yyyy') + ' - ' + #numbers.formatDecimal(vente.total, 0, 'COMMA', 2, 'POINT') + ' Ar'}">
                            </option>
                        </th:block>
                    </select>
                </div>

                <div class="form-group">
                    <label>Date de livraison</label>
                    <input type="date" name="dateLivraison" id="dateLivraisonInput"
                        th:value="${#temporals.format(T(java.time.LocalDate).now(), 'yyyy-MM-dd')}" required />
                    <small id="dateLivraisonHint" style="color: #666; font-size: 12px;"></small>
                </div>

                <div class="form-group">
                    <label>Adresse de livraison</label>
                    <textarea name="adresseLivraison" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <label>Frais de livraison</label>
                    <input type="number" step="0.01" min="0" name="fraisLivraison" value="0.00" required />
                </div>

                <div class="form-group">
                    <label>Statut</label>
                    <select name="statutCode" required>
                        <option value="">Sélectionner un statut</option>
                        <th:block th:each="statut : ${statutsLivraison}">
                            <option th:value="${statut.code}" th:text="${statut.code}"
                                th:selected="${statut.code == 'en_attente'}"></option>
                        </th:block>
                    </select>
                    <small style="color: #666; font-size: 12px;">Défini lors de la création de la livraison.</small>
                </div>

                <div class="form-actions">
                    <a th:href="@{/admin/livraisons}" class="btn-secondary">Retour</a>
                    <button type="submit" class="btn-primary">Enregistrer</button>
                </div>

            </form>
        </div>

        <script th:inline="javascript">
            document.addEventListener('DOMContentLoaded', function () {
                var venteSelect = document.getElementById('venteSelect');
                var dateInput = document.getElementById('dateLivraisonInput');
                var hint = document.getElementById('dateLivraisonHint');

                function majMinDate() {
                    var option = venteSelect.options[venteSelect.selectedIndex];
                    var dateVente = option ? option.getAttribute('data-date-vente') : null;

                    if (dateVente) {
                        dateInput.setAttribute('min', dateVente);
                        hint.textContent = 'La livraison ne peut pas être datée avant le ' +
                            dateVente.split('-').reverse().join('/') + ' (date de la vente).';

                        // Si la date déjà saisie est maintenant invalide, on la corrige
                        if (dateInput.value && dateInput.value < dateVente) {
                            dateInput.value = dateVente;
                        }
                    } else {
                        dateInput.removeAttribute('min');
                        hint.textContent = '';
                    }
                }

                venteSelect.addEventListener('change', majMinDate);
                majMinDate(); // au cas où une vente serait déjà sélectionnée au chargement
            });
        </script>

    </div>
</body>

</html>
