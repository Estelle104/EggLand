<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer une livraison</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        .page-header { margin-bottom: 24px; }
        .page-header h2 { color: var(--text); font-size: 22px; }
        .card-form { background: var(--card); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); }
        .form-actions { display: flex; justify-content: space-between; gap: 12px; margin-top: 20px; }
        .btn-primary, .btn-secondary { display: inline-block; text-decoration: none; border-radius: 8px; padding: 12px 18px; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-secondary { background: var(--border); color: var(--text); }
    </style>
</head>
<body>
<div class="app">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <div class="main">
        <div th:replace="fragments/header :: header"></div>
        <div class="content">

            <div class="page-header">
                <h2>Créer une livraison</h2>
            </div>

            <div class="card-form">
                <form th:action="@{/admin/livraisons/save}" method="post">

                    <div class="form-group">
                        <label>Type de produit</label>
                        <select name="produitCode" required>
                            <option value="">Sélectionner un type</option>
                            <th:block th:if="${#lists.isEmpty(produits)}">
                                <option value="oeuf">Oeufs</option>
                                <option value="poule">Viande</option>
                                <option value="fumier">Engrais</option>
                            </th:block>
                            <th:block th:unless="${#lists.isEmpty(produits)}">
                                <option th:each="produit : ${produits}" th:value="${produit.code}" th:text="${produit.code}"></option>
                            </th:block>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Date de livraison</label>
                        <input type="date" name="dateLivraison" th:value="${#temporals.format(T(java.time.LocalDate).now(), 'yyyy-MM-dd')}" required />
                    </div>

                    <div class="form-group">
                        <label>Adresse de livraison</label>
                        <textarea name="adresseLivraison" rows="3" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Frais de livraison</label>
                        <input type="number" step="0.01" min="0" name="fraisLivraison" value="0.00" required />
                    </div>

                    <div class="form-group">
                        <label>Statut</label>
                        <select name="statutCode" required>
                            <option value="">Sélectionner un statut</option>
                            <th:block th:each="statut : ${statuts}">
                                <option th:value="${statut.code}" th:text="${statut.code}"></option>
                            </th:block>
                        </select>
                    </div>

                    <div class="form-actions">
                        <a th:href="@{/admin/livraisons}" class="btn-secondary">Retour</a>
                        <button type="submit" class="btn-primary">Enregistrer</button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>
</body>
</html>
