<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - EggLand</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm p-4">
                <h2 class="text-center mb-4">Connexion EggLand</h2>

                <div th:if="${param.error}" class="alert alert-danger">
                    Identifiants incorrects ou compte inactif.
                </div>

                <form id="loginForm" th:action="@{/login}" method="post">
                    
                    <div class="mb-3 text-center">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="profile" id="profileStaff" value="staff" checked>
                            <label class="form-check-label" for="profileStaff">Admin / Gestionnaire</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="profile" id="profileClient" value="client">
                            <label class="form-check-label" for="profileClient">Espace Client</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="username" class="form-label">Adresse Email</label>
                        <input type="email" id="username" name="username" class="form-control" required>
                    </div>

                    <div class="mb-3" id="passwordGroup">
                        <label for="password" class="form-label">Mot de passe</label>
                        <input type="password" id="password" name="password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-3">Se connecter</button>
                </form>
                
                <div class="text-center mt-3">
                    <a th:href="@{/inscription}">Pas encore de compte ? S'inscrire</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const radioStaff = document.getElementById('profileStaff');
    const radioClient = document.getElementById('profileClient');
    const passwordGroup = document.getElementById('passwordGroup');
    const passwordInput = document.getElementById('password');
    const loginForm = document.getElementById('loginForm');

    // Écouteur pour le profil Admin/Gestionnaire
    radioStaff.addEventListener('change', function() {
        if (this.checked) {
            passwordGroup.style.display = 'block'; // On réaffiche le mot de passe
            passwordInput.required = true;         // Il redevient obligatoire
            loginForm.action = "[[@{/login}]]";    // On cible le système standard Spring Security
        }
    });

    radioClient.addEventListener('change', function() {
        if (this.checked) {
            passwordGroup.style.display = 'none';  // On cache le mot de passe
            passwordInput.required = false;        // Il n'est plus obligatoire
            loginForm.action = "[[@{/client/connexion}]]"; // On cible ton contrôleur personnalisé !
            
            // On renomme temporairement le champ email pour ton contrôleur
            document.getElementById('username').name = "email"; 
        }
    });
</script>
</body>
</html>
