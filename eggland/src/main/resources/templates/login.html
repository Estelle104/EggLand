<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - EggLand</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/loginVente.css}">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow p-4 custom-card">
                <h2 class="text-center mb-4" style="color: var(--dark); font-weight: 700;">Espace Client</h2>

                <div th:if="${param.error}" class="alert alert-danger">
                    <span th:text="${param.error}">Identifiants incorrects ou compte inactif.</span>
                </div>

                <form th:action="@{/client/connexion}" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">Adresse Email</label>
                        <input type="email" id="email" name="email" class="form-control" required placeholder="nom@exemple.com">
                    </div>
                    <button type="submit" class="btn btn-client w-100 mt-3 shadow-sm">Se connecter</button>
                </form>
                
                <hr class="my-4">

                <div class="text-center footer-links">
                    <a th:href="@{/inscription}" class="d-block mb-2">Pas encore de compte ? S'inscrire</a>
                    <a th:href="@{/}" class="text-muted small">Retour à l'accueil</a>
                </div>

                <div class="text-center mt-5">
                    <a th:href="@{/admin/login}" class="text-secondary" style="font-size: 0.75rem; text-decoration: none;">
                        Accès administrateur et gestionnaire
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
