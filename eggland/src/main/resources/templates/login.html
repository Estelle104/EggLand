<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EggLand - Connexion</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"> </head>
<body>
    <div class="login-container">
        <h2>Connexion à EggLand</h2>

        <div th:if="${param.error}" style="color: red; margin-bottom: 15px;">
            <p>Email ou mot de passe incorrect.</p>
        </div>
        
        <div th:if="${param.logout}" style="color: green; margin-bottom: 15px;">
            <p>Vous avez été déconnecté avec succès.</p>
        </div>

        <div th:if="${successMessage}" style="color: green; margin-bottom: 15px;">
            <p th:text="${successMessage}"></p>
        </div>

        <form th:action="@{/login}" method="post">
            
            <div class="form-group">
                <label for="username">Adresse Email :</label>
                <input type="email" id="username" name="username" required placeholder="exemple@mail.com" />
            </div>

            <div class="form-group">
                <label for="password">Mot de passe :</label>
                <input type="password" id="password" name="password" placeholder="Laisser vide si vous êtes Client" />
                <small style="color: gray; display: block; margin-top: 5px;">
                    💡 <strong>Clients :</strong> Saisissez votre email et laissez ce champ totalement vide pour vous connecter.
                </small>
            </div>

            <button type="submit">Se connecter</button>
        </form>

        <p style="margin-top: 20px;">
            Nouveau client ? <a th:href="@{/client/inscription}">Créez un compte ici</a>
        </p>
    </div>
</body>
</html>
