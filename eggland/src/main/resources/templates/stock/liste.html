<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{fragments/layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock - Eggland</title>
    <link rel="stylesheet" th:href="@{/css/stock.css}">
</head>

<body>
    <div layout:fragment="content">

        <div class="page-header">
            <h2 th:text="${pageTitle}">Stock des nourritures</h2>
            <div style="display:flex; gap:8px; align-items:center;">
                <a th:href="@{/admin/stock/entree}" class="btn-action-header"><i class="fa-solid fa-plus"></i>
                    Entrée</a>
                <a th:href="@{/admin/stock/sortie}" class="btn-action-header" style="background:#e47373;"><i
                        class="fa-solid fa-minus"></i> Sortie</a>
                <a th:href="@{/admin/stock/historique}" class="btn-action-header"
                    style="background:var(--text-light);"><i class="fa-solid fa-clock-rotate-left"></i> Historique</a>
            </div>
            <div
                th:replace="~{fragments/pagination :: pager(currentPage=${currentPage}, totalPages=${totalPages}, size=${size}, url=${baseUrl}, filters=${filtres})}">
            </div>
        </div>

        <div class="card-stock">
            <div class="stock-grid">
                <div class="stock-item" th:each="n : ${nourritures}">
                    <h3 th:text="${n.libelle}">Maïs</h3>
                    <div class="libelle">Prix unitaire: <span
                            th:text="${#numbers.formatDecimal(n.prixUnitaire, 0, 'WHITESPACE', 2, 'COMMA')} + ' Ar'"></span>
                    </div>

                    <div th:with="stock=${stocks[n.id]}, seuil=${n.seuilAlerte}">
                        <div th:if="${seuil != null}">
                            <div class="stock-valeurs">
                                <span class="stock"
                                    th:text="${#numbers.formatDecimal(stock, 1, 'WHITESPACE', 2, 'COMMA')} + ' kg'">0
                                    kg</span>
                                <span class="seuil" th:text="'Seuil: ' + ${seuil}">Seuil: 50</span>
                            </div>

                    <div th:with="pct=${stock.doubleValue() >= seuil} ? 100 : (${stock.doubleValue() < 0} ? 0 : ${stock.doubleValue() / seuil * 100})">
                    <div class="barre-container">
                        <div class="barre-remplie"
                            th:class="${stock.doubleValue() > seuil} ? 'barre-remplie barre-vert' : 'barre-remplie barre-rouge'"
                            th:style="'width:' + ${pct} + '%'">
                        </div>
                    </div>
                    <span class="badge-statut" th:class="${stock.doubleValue() > seuil} ? 'badge-statut badge-ok' : 'badge-statut badge-alerte'"
                        th:text="${stock.doubleValue() > seuil} ? 'STOCK OK' : 'STOCK FAIBLE'"></span>
                    </div>
                        </div>
                        <div th:if="${seuil == null}" class="stock-valeurs">
                            <span class="stock"
                                th:text="${#numbers.formatDecimal(stock, 1, 'WHITESPACE', 2, 'COMMA')} + ' kg'">0
                                kg</span>
                            <span class="seuil">Pas de seuil</span>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(nourritures)}"
                style="text-align:center; padding:40px; color:var(--text-light);">
                Aucune nourriture enregistrée.
            </div>
        </div>

    </div>
</body>

</html>
