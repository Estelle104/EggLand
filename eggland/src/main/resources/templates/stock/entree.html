<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{fragments/layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrée de stock - Eggland</title>
    <link rel="stylesheet" th:href="@{/css/stock.css}">
</head>

<body>
        <div layout:fragment="content">

                <div class="page-header">
                    <h2>Entrée de stock</h2>
                </div>

                <div th:if="${error}" style="background:#f8d7da; color:#721c24; padding:12px 16px; border-radius:10px; margin-bottom:16px; font-size:14px;">
                    <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
                </div>

                <div class="card-form">
                    <form th:action="@{/stock/entree}" method="post">

                        <div class="form-group">
                            <label for="nourriture">Nourriture</label>
                            <select id="nourriture" name="nourriture" required>
                                <option value="">-- Sélectionner --</option>
                                <option th:each="n : ${nourritures}" th:value="${n.id}" th:text="${n.libelle}"></option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="quantite">Quantité (kg)</label>
                            <input type="number" id="quantite" name="quantite" step="0.001" placeholder="Ex: 100" required />
                        </div>

                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" name="date" required />
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-submit"><i class="fa-solid fa-check"></i> Valider l'entrée</button>
                            <a th:href="@{/stock}" class="btn-annuler"><i class="fa-solid fa-xmark"></i> Annuler</a>
                        </div>
                    </form>
                </div>

            </div>
</body>
</html>
