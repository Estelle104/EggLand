<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sortie de stock - Eggland</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/stock.css}">
</head>

<body>
    <div class="app">
        <div th:replace="fragments/sidebar :: sidebar"></div>
        <div class="main">
            <div th:replace="fragments/header :: header"></div>
            <div class="content">

                <div class="page-header">
                    <h2>Sortie de stock</h2>
                </div>

                <div class="card-form">
                    <form th:action="@{/stock/sortie}" method="post">

                        <div class="form-group">
                            <label for="nourriture">Nourriture</label>
                            <select id="nourriture" name="nourriture" required>
                                <option value="">-- Sélectionner --</option>
                                <option th:each="n : ${nourritures}" th:value="${n.id}" th:text="${n.libelle}"></option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="quantite">Quantité (kg)</label>
                            <input type="number" id="quantite" name="quantite" step="0.001" placeholder="Ex: 50" required />
                        </div>

                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" name="date" required />
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-submit"><i class="fa-solid fa-check"></i> Valider la sortie</button>
                            <a th:href="@{/stock}" class="btn-annuler"><i class="fa-solid fa-xmark"></i> Annuler</a>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
