<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traitements - EggLand</title>

    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .page-header h2 {
            color: var(--text);
            font-size: 22px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-nouveau {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-nouveau:hover {
            background: var(--hover);
        }

        .btn-historique {
            background: var(--card);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            transition: 0.2s;
        }

        .btn-historique:hover {
            background: var(--bg);
        }

        .alert {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        .table-container {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg);
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            color: var(--text);
        }

        tbody tr:hover {
            background: rgba(184, 122, 42, 0.05);
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit, .btn-delete {
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-edit {
            background: #e8f3f5;
            color: #00838f;
        }

        .btn-edit:hover {
            background: #b2dfdb;
        }

        .btn-delete {
            background: #ffebee;
            color: #c62828;
        }

        .btn-delete:hover {
            background: #ef5350;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #999;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
            color: var(--border);
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 16px;
        }

        .badge-mvt {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: #fff3e0;
            color: #e65100;
        }
    </style>
</head>

<body>
<div class="app">

    <div th:replace="fragments/sidebar :: sidebar"></div>

    <div class="main">

        <div th:replace="fragments/header :: header"></div>

        <div class="content">

            <!-- Messages flash -->
            <div class="alert alert-success" th:if="${success}">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success}"></span>
            </div>
            <div class="alert alert-error" th:if="${error}">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <div class="page-header">
                <h2><i class="fa-solid fa-syringe" style="color: var(--primary); margin-right: 8px;"></i>
                    <span th:text="${pageTitle}">Traitements</span>
                </h2>
                <div class="header-actions">
                    <a th:href="@{/traitements/historique}" class="btn-historique">
                        <i class="fas fa-history"></i> Historique
                    </a>
                    <a th:href="@{/traitements/nouveau}" class="btn-nouveau">
                        <i class="fas fa-plus"></i> Nouveau traitement
                    </a>
                </div>
            </div>

            <div class="table-container" th:if="${!traitements.isEmpty()}">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Lot</th>
                            <th>Type</th>
                            <th>Date</th>
                            <th>Coût (Ar)</th>
                            <th>Description</th>
                            <th>Mvt Argent</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="traitement : ${traitements}">
                            <td th:text="${traitement.id}"></td>
                            <td th:text="'Lot #' + ${traitement.lot.id}"></td>
                            <td th:text="${traitement.type.code}"></td>
                            <td th:text="${#temporals.format(traitement.date, 'dd/MM/yyyy')}"></td>
                            <td th:text="${#numbers.formatDecimal(traitement.cout, 1, 'WHITESPACE', 2, 'COMMA')} + ' Ar'"></td>
                            <td th:text="${traitement.description != null ? traitement.description : '-'}"></td>
                            <td>
                                <span class="badge-mvt"
                                      th:if="${traitement.cout != null and traitement.cout.compareTo(T(java.math.BigDecimal).ZERO) > 0}">
                                    <i class="fas fa-arrow-down"></i> Sortie créée
                                </span>
                                <span th:if="${traitement.cout == null or traitement.cout.compareTo(T(java.math.BigDecimal).ZERO) == 0}" style="color:#999; font-size:12px;">—</span>
                            </td>
                            <td class="actions">
                                <a th:href="@{/traitements/edit/{id}(id=${traitement.id})}" class="btn-edit">
                                    <i class="fas fa-edit"></i> Modifier
                                </a>
                                <a th:href="@{/traitements/delete/{id}(id=${traitement.id})}"
                                   class="btn-delete"
                                   onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce traitement ?');">
                                    <i class="fas fa-trash"></i> Supprimer
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty-state" th:if="${traitements.isEmpty()}">
                <i class="fa-solid fa-syringe"></i>
                <p>Aucun traitement enregistré</p>
                <a th:href="@{/traitements/nouveau}" class="btn-nouveau">
                    <i class="fas fa-plus"></i> Ajouter le premier traitement
                </a>
            </div>

        </div>

    </div>

</div>
</body>

</html>
