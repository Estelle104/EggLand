<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique Traitements - EggLand</title>

    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        .page-header { margin-bottom: 24px; }
        .page-header h2 { color: var(--text); font-size: 22px; }
        .filters { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 24px; margin-bottom: 24px; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
        .filter-group { flex: 1; min-width: 200px; }
        .filter-group label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; color: var(--text); }
        .filter-group input, .filter-group select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--bg); outline: none; }
        .btn-filtrer { background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.2s; }
        .btn-filtrer:hover { background: var(--hover); }
        .table-container { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--bg); }
        th { padding: 12px 16px; text-align: left; font-size: 14px; font-weight: 600; color: var(--text); border-bottom: 1px solid var(--border); }
        td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text); }
        tbody tr:hover { background: rgba(184, 122, 42, 0.05); }
        .empty-state { text-align: center; padding: 48px 24px; color: #999; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; text-align: center; }
        .stat-label { color: #999; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .stat-value { color: var(--primary); font-size: 28px; font-weight: 700; }
        .type-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; background: #e3f2fd; color: #1565c0; }
    </style>
</head>

<body>
<div class="app">
    <div th:replace="fragments/sidebar :: sidebar"></div>
    <div class="main">
        <div th:replace="fragments/header :: header"></div>
        <div class="content">
            <div class="page-header">
                <h2>Historique des Traitements</h2>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label>Filtrer par lot</label>
                    <select id="lotFilter">
                        <option value="">Tous les lots</option>
                        <option th:each="lot : ${lots}" th:value="${lot.id}" th:text="'Lot #' + ${lot.id}"></option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Filtrer par type</label>
                    <select id="typeFilter">
                        <option value="">Tous les types</option>
                        <option th:each="type : ${types}" th:value="${type.id}" th:text="${type.code}"></option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Date de début</label>
                    <input type="date" id="startDate">
                </div>
                <div class="filter-group">
                    <label>Date de fin</label>
                    <input type="date" id="endDate">
                </div>
                <button class="btn-filtrer"><i class="fas fa-filter"></i> Filtrer</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Traitements totaux</div>
                    <div class="stat-value" th:text="${traitements != null ? #lists.size(traitements) : 0}">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Coût total (Ar)</div>
                    <div class="stat-value" th:text="${totalCost != null ? #numbers.formatDecimal(totalCost, 1, 2) : '0'}">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Coût moyen (Ar)</div>
                    <div class="stat-value" th:text="${avgCost != null ? #numbers.formatDecimal(avgCost, 1, 2) : '0'}">0</div>
                </div>
            </div>

            <div class="table-container">
                <table th:if="${traitements != null and !#lists.isEmpty(traitements)}">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Lot</th>
                            <th>Type</th>
                            <th>Description</th>
                            <th>Coût (Ar)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="traitement : ${traitements}">
                            <td th:text="${#temporals.format(traitement.date, 'dd/MM/yyyy')}"></td>
                            <td th:text="${traitement.lot != null ? 'Lot #' + traitement.lot.id : '-'}"></td>
                            <td th:text="${traitement.type != null ? traitement.type.code : '-'}"></td>
                            <td th:text="${traitement.description}"></td>
                            <td th:text="${#numbers.formatDecimal(traitement.cout, 1, 2)}"></td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${traitements == null or #lists.isEmpty(traitements)}">Aucun traitement enregistré</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
