<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${traitement.id == null} ? 'Nouveau traitement - EggLand' : 'Modifier le traitement - EggLand'">
        Traitement - EggLand
    </title>

    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        .page-header {
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .page-header h2 {
            color: var(--text);
            font-size: 22px;
        }

        .card-form {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px;
            max-width: 700px;
        }

        .info-mvt {
            background: #fff3e0;
            border: 1px solid #ffcc80;
            border-radius: 10px;
            padding: 14px 18px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #e65100;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .info-mvt i {
            margin-top: 2px;
            flex-shrink: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: var(--bg);
            outline: none;
            transition: 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(184, 122, 42, 0.15);
            background: white;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn-enregistrer {
            background: var(--primary);
            color: white;
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-enregistrer:hover {
            background: var(--hover);
        }

        .btn-annuler {
            background: var(--border);
            color: var(--text);
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-annuler:hover {
            background: #d4c4b0;
            color: var(--text);
        }
    </style>
</head>

<body>
<div class="app">

    <div th:replace="fragments/sidebar :: sidebar"></div>

    <div class="main">

        <div th:replace="fragments/header :: header"></div>

        <div class="content">

            <div class="page-header">
                <i class="fa-solid fa-syringe" style="color: var(--primary); font-size: 20px;"></i>
                <h2 th:text="${traitement.id == null} ? 'Nouveau traitement' : 'Modifier le traitement #' + ${traitement.id}"></h2>
            </div>

            <div class="card-form">

                <!-- Info sur le mouvement d'argent automatique -->
                <div class="info-mvt" th:if="${traitement.id == null}">
                    <i class="fas fa-info-circle"></i>
                    <div>
                        <strong>Mouvement d'argent automatique :</strong><br>
                        Un mouvement de <strong>sortie</strong> sera automatiquement créé dans la trésorerie
                        avec le coût saisi, catégorie <em>traitement_veterinaire</em>.
                    </div>
                </div>

                <form th:action="@{/traitements/save}"
                      th:object="${traitement}"
                      method="post">

                    <!-- Champ caché pour l'ID lors de la modification -->
                    <input type="hidden" th:field="*{id}">

                    <div class="form-group">
                        <label>Lot *</label>
                        <select th:field="*{lot}" required>
                            <option value="">-- Choisir un lot --</option>
                            <option th:each="lot : ${lots}"
                                    th:value="${lot.id}"
                                    th:text="'Lot #' + ${lot.id} + ' (' + ${lot.race.nom} + ')'">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Type de traitement *</label>
                        <select th:field="*{type}" required>
                            <option value="">-- Choisir un type --</option>
                            <option th:each="type : ${types}"
                                    th:value="${type.id}"
                                    th:text="${type.code}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Date *</label>
                        <input type="date"
                               th:field="*{date}"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Coût (Ar) *</label>
                        <input type="number"
                               min="0"
                               step="0.01"
                               th:field="*{cout}"
                               placeholder="0.00"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea th:field="*{description}"
                                  rows="4"
                                  placeholder="Notes optionnelles sur le traitement..."></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-enregistrer">
                            <i class="fas fa-save"></i> Enregistrer
                        </button>
                        <a th:href="@{/traitements}" class="btn-annuler">
                            <i class="fas fa-times"></i> Annuler
                        </a>
                    </div>

                </form>
            </div>

        </div>

    </div>

</div>
</body>

</html>
