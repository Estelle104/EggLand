<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des bâtiments - Eggland</title>

    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .page-header h2 {
            color: var(--text);
            font-size: 22px;
        }

        .card-batiment {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
        }

        .table-batiment {
            width: 100%;
            border-collapse: collapse;
        }
        .table-batiment th {
            text-align: left;
            padding: 14px 12px;
            color: var(--text-light);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border);
        }
        .table-batiment td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-size: 14px;
        }
        .table-batiment tr:hover td {
            background: rgba(184, 122, 42, 0.04);
        }

        .badge-capacite {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .badge-elevee {
            background: #d4edda;
            color: #155724;
        }
        .badge-moyenne {
            background: #fff3cd;
            color: #856404;
        }
        .badge-faible {
            background: #f8d7da;
            color: #721c24;
        }

        .vide-message {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }
    </style>
</head>

<body>
    <div class="app">

        <div th:replace="fragments/sidebar :: sidebar"></div>

        <div class="main">

            <div th:replace="fragments/header :: header"></div>

            <div class="content">

                <div class="page-header">
                    <h2 th:text="${pageTitle ?: 'Liste des bâtiments'}">Liste des bâtiments</h2>
                </div>

                <div class="card-batiment">
                    <table class="table-batiment">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nom</th>
                                <th>Capacité</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="b : ${batiments}">
                                <td th:text="${b.id}"></td>
                                <td th:text="${b.nom}"></td>
                                <td>
                                    <span th:text="${b.capacite}"
                                          th:classappend="${b.capacite >= 1000} ? 'badge-capacite badge-elevee' : (${b.capacite >= 500} ? 'badge-capacite badge-moyenne' : 'badge-capacite badge-faible')"
                                          th:style="'background:' + (${b.capacite >= 1000} ? '#d4edda' : (${b.capacite >= 500} ? '#fff3cd' : '#f8d7da')) + '; color:' + (${b.capacite >= 1000} ? '#155724' : (${b.capacite >= 500} ? '#856404' : '#721c24')) + '; padding:4px 12px; border-radius:20px; font-weight:600;'">
                                    </span>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div th:if="${#lists.isEmpty(batiments)}" class="vide-message">
                        Aucun bâtiment enregistré.
                    </div>
                </div>

            </div>

        </div>

    </div>
</body>

</html>
