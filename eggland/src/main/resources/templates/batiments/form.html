<!DOCTYPE html>
<html lang="fr" 
      xmlns:th="http://www.thymeleaf.org" 
      layout:decorate="~{fragments/layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${batiment.id == null} ? 'Nouveau bâtiment' : 'Modifier le bâtiment'">Bâtiment - Eggland</title>

    <link rel="stylesheet" th:href="@{/css/batiments.css}">
</head>

<body>
    <div layout:fragment="content">

                <div class="page-header">
                    <h2 th:text="${batiment.id == null} ? 'Nouveau bâtiment' : 'Modifier le bâtiment'"></h2>
                </div>

                <div class="card-form">
                    <form th:action="@{/batiments/save}" th:object="${batiment}" method="post">

                        <input type="hidden" th:field="*{id}" />

                        <div class="form-group">
                            <label for="nom">Nom</label>
                            <input type="text" id="nom" th:field="*{nom}" placeholder="Ex: Poulailler A" required />
                        </div>

                        <div class="form-group">
                            <label for="capacite">Capacité</label>
                            <input type="number" id="capacite" th:field="*{capacite}"
                                   placeholder="Ex: 1500" required />
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-enregistrer">
                                <i class="fa-solid fa-save"></i> Enregistrer
                            </button>
                            <a th:href="@{/batiments}" class="btn-annuler">
                                <i class="fa-solid fa-xmark"></i> Annuler
                            </a>
                        </div>

                    </form>
                </div>

            </div>
</body>

</html>
