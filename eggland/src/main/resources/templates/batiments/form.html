<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${batiment.id == null} ? 'Nouveau bâtiment' : 'Modifier le bâtiment'">Bâtiment - Eggland</title>

    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/batiments.css}">
</head>

<body>
    <div class="app">

        <div th:replace="fragments/sidebar :: sidebar"></div>

        <div class="main">

            <div th:replace="fragments/header :: header"></div>

            <div class="content">

                <div class="page-header">
                    <h2 th:text="${batiment.id == null} ? 'Nouveau bâtiment' : 'Modifier le bâtiment'"></h2>
                </div>

                <div class="card-form">
                    <form th:action="@{/batiments/save}" th:object="${batiment}" method="post">

                        <input type="hidden" th:field="*{id}" />

                        <div class="form-group">
                            <label for="nom">Nom</label>
                            <input type="text" id="nom" th:field="*{nom}" placeholder="Ex: Poulailler A" required />
                        </div>

                        <div class="form-group">
                            <label for="capacite">Capacité</label>
                            <input type="number" id="capacite" th:field="*{capacite}"
                                   placeholder="Ex: 1500" required />
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-enregistrer">
                                <i class="fa-solid fa-save"></i> Enregistrer
                            </button>
                            <a th:href="@{/batiments}" class="btn-annuler">
                                <i class="fa-solid fa-xmark"></i> Annuler
                            </a>
                        </div>

                    </form>
                </div>

            </div>

        </div>

    </div>
</body>

</html>
