<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Lots</title>

    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/listeLots.css}">
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main">

        <!-- Header -->
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="content">

            <div class="liste-header">
                <div>
                    <h1>Gestion des Lots</h1>
                    <small>--</small>
                </div>

                <a th:href="@{/lots/create}" class="btn-ajouter">
                    Ajouter un lot
                </a>
            </div>

            <!-- FILTRES -->
            <div class="filtres-section">

                <h2>Filtrer par :</h2>

                <form th:action="@{/lots/list}" method="get" class="filtres-form">

                    <select name="batiment">
                        <option value="">Batiment</option>

                        <option
                                th:each="b : ${batiments}"
                                th:value="${b.id}"
                                th:text="${b.nom}">
                        </option>

                    </select>

                    <select name="statut">
                        <option value="">Statut</option>

                        <option
                                th:each="s : ${statuts}"
                                th:value="${s.id}"
                                th:text="${s.code}">
                        </option>

                    </select>

                </form>

            </div>

            <!-- AUCUN LOT -->
            <div th:if="${#lists.isEmpty(lots)}" class="empty-state">
                Aucun lot trouvé
            </div>

            <!-- CARDS -->
            <div class="lots-grid">

                <div class="lot-card"
                     th:each="lot : ${lots}">

                    <!-- Header -->
                    <div class="lot-header">

                        <h3>
                            Lot
                            <span th:text="${lot.id}"></span>
                        </h3>

                        <div class="menu">
                            ⋮
                        </div>

                    </div>

                    
                    <div class="lot-status">

                        <span class="badge-actif"
                              th:if="${lot.statut != null and lot.statut.code == 'actif'}">
                            Actif
                        </span>

                        <span class="badge-reforme"
                              th:if="${lot.statut != null and lot.statut.code == 'reforme'}">
                            Reformer
                        </span>

                    </div>

                    <!-- Infos -->
                    <div class="lot-info">

                        <p>
                            <span>Race :</span>
                            <strong th:text="${lot.race.nom}">
                                Sussex
                            </strong>
                        </p>

                        <p>
                            <span>Batiment</span>
                            <strong th:text="${lot.batiment.nom}">
                                Batiment A
                            </strong>
                        </p>

                        <p>
                            <span>Date arrivée :</span>
                            <strong th:text="${#temporals.format(lot.dateArrivee,'yyyy-MM-dd')}">
                            </strong>
                        </p>

                        <p>
                            <span>Age :</span>
                            <strong>
                                Semaine
                                <span th:text="${lot.ageSemaine}">
                                    9
                                </span>
                            </strong>
                        </p>

                    </div>

                    <!-- Bouton -->
                    <div class="lot-footer">

                        <a th:href="@{/lots/{id}/modifier(id=${lot.id})}"
                           class="btn-modifier">
                            Modifier
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
