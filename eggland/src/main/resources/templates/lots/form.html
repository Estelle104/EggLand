<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
        <link rel="stylesheet" th:href="@{/css/variables.css}">

    <link rel="stylesheet" th:href="@{/css/layout.css}">

    <link rel="stylesheet" th:href="@{/css/sidebar.css}">

    <link rel="stylesheet" th:href="@{/css/header.css}">

    <title>Ajouter un Lot</title>
    <style>
        body {
    margin: 0;
    background: #f4f2eb;
    font-family: Arial, Helvetica, sans-serif;
}

/* Header */
.page-header {
    background: #e8e3d6;
    padding: 15px 25px;
    border-bottom: 1px solid #ddd;
}

.page-header h2 {
    margin: 0;
    color: #1f2937;
    font-weight: 700;
}

/* Zone principale */
main {
    padding: 25px;
}

/* Carte du formulaire */
.form-container {
    width: 420px;
    background: #ffffff;
    border-radius: 15px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    overflow: hidden;
}

/* Partie haute du formulaire */
.form-body {
    padding: 25px;
}

/* Labels */
.form-label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 600;
    color: #374151;
}

/* Inputs */
.form-control,
.form-select {
    width: 100%;
    height: 48px;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    background: #f7f8fa;
    padding: 0 15px;
    font-size: 14px;
    box-sizing: border-box;
}

.form-control:focus,
.form-select:focus {
    outline: none;
    border-color: #8b4a1f;
    background: white;
}

/* Ligne date + quantité */
.row {
    display: flex;
    gap: 15px;
}

.col {
    flex: 1;
}

/* Footer de la carte */
.form-footer {
    background: #f8f9fb;
    padding: 18px 25px;
    border-top: 1px solid #ececec;
}

/* Bouton */
.btn-brown {
    width: 100%;
    height: 46px;
    border: none;
    border-radius: 10px;
    background: #8b4a1f;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.btn-brown:hover {
    background: #733b17;
}

/* Messages */
.alert-danger {
    background: #fde2e2;
    color: #b91c1c;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 15px;
}
    </style>
</head>
<body>
       <div class="app">

        <div th:replace="fragments/sidebar :: sidebar"></div>

        <div class="main">

            <div th:replace="fragments/header :: header"></div>

            <div class="content">
 <main layout:fragment="content">
    <h3 class="mb-4">Gestion des Lots</h3>

   
    <div th:if="${error}" class="alert alert-danger">
        <strong>Erreur!</strong>
        <span th:text="${error}"></span>
    </div>

    <div class="form-container" style="background: white; padding: 30px; border-radius: 12px; max-width: 500px;">
        <form th:action="@{/lots/create}" method="POST" th:object="${lot}">
            
            <div class="mb-4">
                <label class="form-label">Race des Volailles</label>
                <select class="form-select" th:field="*{race}" required>
                    <option value="">-- Sélectionnez une race --</option>
                    <option th:each="race : ${races}"
                            th:value="${race.id}"
                            th:text="${race.nom}">
                    </option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">Date d'arrivée</label>
                <input type="date" class="form-control" th:field="*{dateArrivee}" required>
                
            </div>
            <div class="mb-4">
                <label class="form-label">Nombre initial</label>
                <input type="number" class="form-control" th:field="*{nombreInitial}" min="1" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Bâtiment</label>
                <select class="form-select" th:field="*{batiment}" required>
                    <option value="">-- Sélectionnez un bâtiment --</option>
                    <option th:each="batiment : ${batiments}"
                            th:value="${batiment.id}"
                            th:text="${batiment.nom}">
                    </option>
                </select>
            </div>

            <button type="submit" class="btn btn-brown w-100">
                ➤ Ajouter
            </button>
        </form>
    </div>
</main>
            </div>

        </div>

    </div>
   

</body>
</html>
