<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="fragments/layout">

<head>
    <title th:text="${race.id == null} ? 'Nouvelle race' : 'Modifier la race'"></title>
</head>

<body>
    <main layout:fragment="content">
        <div class="container-fluid">
            <h2 class="mb-4" th:text="${race.id == null} ? 'Nouvelle race' : 'Modifier la race'"></h2>

            <div class="card">
                <div class="card-body">
                    <form th:action="@{/races/save}" th:object="${race}" method="post" class="row g-3">

                        <input type="hidden" th:field="*{id}" />

                        <div class="col-md-6">
                            <label for="nom" class="form-label">Nom</label>
                            <input type="text" id="nom" th:field="*{nom}" class="form-control" required />
                        </div>

                        <div class="col-md-6">
                            <label for="prixUnitaire" class="form-label">Prix unitaire</label>
                            <input type="number" id="prixUnitaire" th:field="*{prixUnitaire}"
                                   class="form-control" step="0.01" required />
                        </div>

                        <div class="col-md-6">
                            <label for="rendementMoyenMois" class="form-label">Rendement moyen / mois</label>
                            <input type="number" id="rendementMoyenMois" th:field="*{rendementMoyenMois}"
                                   class="form-control" required />
                        </div>

                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">
                                <i class="fa-solid fa-save"></i> Enregistrer
                            </button>
                            <a th:href="@{/races}" class="btn btn-secondary ms-2">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
