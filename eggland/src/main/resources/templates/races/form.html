<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${race.id == null} ? 'Nouvelle race' : 'Modifier la race'">Race - Eggland</title>

    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/races.css}">
</head>

<body>
    <div class="app">

        <div th:replace="fragments/sidebar :: sidebar"></div>

        <div class="main">

            <div th:replace="fragments/header :: header"></div>

            <div class="content">

                <div class="page-header">
                    <h2 th:text="${race.id == null} ? 'Nouvelle race' : 'Modifier la race'"></h2>
                </div>

                <div class="card-form">
                    <form th:action="@{/races/save}" th:object="${race}" method="post">

                        <input type="hidden" th:field="*{id}" />

                        <div class="form-group">
                            <label for="nom">Nom</label>
                            <input type="text" id="nom" th:field="*{nom}" placeholder="Ex: Plymouth Rock" required />
                        </div>

                        <div class="form-group">
                            <label for="prixUnitaire">Prix unitaire (Ar)</label>
                            <input type="number" id="prixUnitaire" th:field="*{prixUnitaire}"
                                   step="0.01" placeholder="Ex: 5000" required />
                        </div>

                        <div class="form-group">
                            <label for="rendementMoyenMois">Rendement moyen / mois</label>
                            <input type="number" id="rendementMoyenMois" th:field="*{rendementMoyenMois}"
                                   placeholder="Ex: 25" required />
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-enregistrer">
                                <i class="fa-solid fa-save"></i> Enregistrer
                            </button>
                            <a th:href="@{/races}" class="btn-annuler">
                                <i class="fa-solid fa-xmark"></i> Annuler
                            </a>
                        </div>

                    </form>
                </div>

            </div>

        </div>

    </div>
</body>

</html>
