<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{fragments/layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des races - Eggland</title>

    <link rel="stylesheet" th:href="@{/css/races.css}">
</head>

<body>
    <div layout:fragment="content">

        <div class="page-header">
            <h2 th:text="${pageTitle ?: 'Liste des races'}">Liste des races</h2>
            <a th:href="@{/admin/races/nouveau}" class="btn-ajouter">
                <i class="fa-solid fa-plus"></i> Nouvelle race
            </a>
        </div>
        <div
            th:replace="~{fragments/pagination :: pager(currentPage=${currentPage}, totalPages=${totalPages}, size=${size}, url='/admin/races', filters=${filtres})}">
        </div>
        <div th:if="${error}"
            style="background:#f8d7da; color:#721c24; padding:12px 16px; border-radius:10px; margin-bottom:16px; font-size:14px;">
            <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
        </div>

        <div class="card-race">
            <table class="table-race">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Prix unitaire</th>
                        <th>Rendement/mois</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="race : ${races}">
                        <td th:text="${race.id}"></td>
                        <td th:text="${race.nom}"></td>
                        <td th:text="${#numbers.formatDecimal(race.prixUnitaire, 0, 'WHITESPACE', 2, 'COMMA')} + ' Ar'">
                        </td>
                        <td th:text="${race.rendementMoyenMois}"></td>
                        <td>
                            <a th:href="@{/admin/races/edit/{id}(id=${race.id})}" class="btn-action btn-modifier">
                                <i class="fa-solid fa-pen"></i> Modifier
                            </a>
                            <a th:href="@{/admin/races/delete/{id}(id=${race.id})}" class="btn-action btn-supprimer"
                                onclick="return confirm('Supprimer cette race ?')">
                                <i class="fa-solid fa-trash"></i> Supprimer
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(races)}" class="vide-message">
                Aucune race enregistrée.
            </div>
        </div>

    </div>
</body>

</html>
