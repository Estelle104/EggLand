<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="fragments/layout">

<head>
    <title>Liste des races</title>
</head>

<body>
    <main layout:fragment="content">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Liste des races</h2>
                <a th:href="@{/races/nouveau}" class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i> Nouvelle race
                </a>
            </div>

            <div class="card">
                <div class="card-body">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nom</th>
                                <th>Prix unitaire</th>
                                <th>Rendement/mois</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="race : ${races}">
                                <td th:text="${race.id}"></td>
                                <td th:text="${race.nom}"></td>
                                <td th:text="${#numbers.formatDecimal(race.prixUnitaire, 0, 'WHITESPACE', 2, 'COMMA')} + ' Ar'"></td>
                                <td th:text="${race.rendementMoyenMois}"></td>
                                <td>
                                    <a th:href="@{/races/edit/{id}(id=${race.id})}"
                                       class="btn btn-sm btn-warning me-2">
                                        <i class="fa-solid fa-edit"></i>
                                    </a>
                                    <a th:href="@{/races/delete/{id}(id=${race.id})}"
                                       class="btn btn-sm btn-danger"
                                       onclick="return confirm('Supprimer cette race ?')">
                                        <i class="fa-solid fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div th:if="${#lists.isEmpty(races)}" class="text-center text-muted py-4">
                        Aucune race enregistrée.
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
