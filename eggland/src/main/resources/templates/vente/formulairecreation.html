<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{fragments/layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de création de vente</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/vente.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <div layout:fragment="content">
        <div class="content">

            <div th:if="${error}" class="alert alert-danger">
                <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
            </div>

            <div class="card-form">
                <form th:action="@{/admin/ventes/creation}" method="post">

                    <div class="form-group">
                        <label>Client</label>
                        <input type="text" name="clientNom" placeholder="Saisir le nom du client" required />
                    </div>

                    <div class="lignes-header">
                        <h3>Lignes de vente</h3>
                        <button type="button" class="btn-ajouter-ligne" id="btn-ajouter-ligne">
                            <i class="fa-solid fa-plus"></i> Ajouter une ligne
                        </button>
                    </div>

                    <table id="lignes-table">
                        <thead>
                            <tr>
                                <th>Produit</th>
                                <th>Lot</th>
                                <th>Race</th>
                                <th>Quantité</th>
                                <th>Prix unitaire</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="lignes-tbody"></tbody>
                        <tfoot>
                            <tr>
                                <td colspan="3" style="border-bottom:none;"></td>
                                <td
                                    style="text-align:right;font-weight:700;padding:18px 12px;font-size:15px;color:var(--text);">
                                    Total :</td>
                                <td style="font-weight:700;padding:18px 12px;font-size:15px;color:var(--primary);"
                                    id="total-vente">0.00 Ar</td>
                                <td style="border-bottom:none;"></td>
                            </tr>
                        </tfoot>
                    </table>

                    <div class="form-actions">
                        <a th:href="@{/admin/ventes/listevente}" class="btn-annuler">
                            <i class="fa-solid fa-xmark"></i> Annuler
                        </a>
                        <button type="submit" class="btn-enregistrer">
                            <i class="fa-solid fa-save"></i> Créer la vente
                        </button>
                    </div>

                </form>
            </div>

        </div>

        <script th:inline="javascript">
            var produitsData = /*[[${produits}]]*/[];
            var lotsData = /*[[${lots}]]*/[];
        </script>
        <script th:src="@{/js/vente.js}"></script>
    </div>
</body>

</html>
