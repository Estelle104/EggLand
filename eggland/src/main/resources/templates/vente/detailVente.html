<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{fragments/layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail de la vente</title>
    <link rel="stylesheet" th:href="@{/css/vente.css}">
</head>
<body>
<div layout:fragment="content">
            <div class="page-header">
                <h2><i class="fa-solid fa-receipt"></i> Détail de la vente <span th:text="'#' + ${vente.id}"></span></h2>
            </div>
            <div class="card detail-page">
                <div class="detail-info-grid">
                    <div class="detail-info-item">
                        <span class="detail-info-label">Client</span>
                        <span class="detail-info-value" th:text="${vente.client != null ? vente.client.nom : '-'}"></span>
                    </div>
                    <div class="detail-info-item">
                        <span class="detail-info-label">Date</span>
                        <span class="detail-info-value" th:text="${vente.date != null ? #temporals.format(vente.date,'dd/MM/yyyy') : '-'}"></span>
                    </div>
                    <div class="detail-info-item">
                        <span class="detail-info-label">Statut</span>
                        <span class="badge"
                              th:if="${vente.statut != null}"
                              th:classappend="${vente.statut.code == 'en_attente'} ? ' badge-yellow' : ' badge-green'"
                              th:text="${vente.statut.code}"></span>
                        <span class="badge badge-gray"  th:if="${vente.statut == null}">N/A</span>
                    </div>
                    <div class="detail-info-item">
                        <span class="detail-info-label">Total</span>
                        <span class="detail-info-value detail-total"
                              th:text="${vente.total != null ? #numbers.formatDecimal(vente.total, 0, 'COMMA', 2, 'POINT') + ' Ar' : '-'}"></span>
                    </div>
                </div>

                <!-- Lignes de détail -->
                <h4 class="detail-section-title">Lignes de vente</h4>
                <table class="detail-table">
                    <thead>
                        <tr>
                            <th>Produit</th>
                            <th>Quantité</th>
                            <th>Prix unitaire</th>
                            <th>Sous-total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(details)}">
                            <td colspan="4" style="text-align:center; color: var(--text-light);">Aucun détail disponible</td>
                        </tr>
                        <tr th:each="d : ${details}">
                            <td th:text="${d.produit != null ? d.produit.code : '-'}"></td>
                            <td th:text="${#numbers.formatDecimal(d.quantite, 0, 'COMMA', 2, 'POINT')}"></td>
                            <td th:text="${#numbers.formatDecimal(d.prixUnitaire, 0, 'COMMA', 2, 'POINT')} + ' Ar'"></td>
                            <td th:text="${#numbers.formatDecimal(d.quantite.multiply(d.prixUnitaire), 0, 'COMMA', 2, 'POINT')} + ' Ar'"></td>
                        </tr>
                    </tbody>
                </table>

                <div class="form-actions">
                    <a th:href="@{/admin/ventes/listevente}" class="btn-annuler">
                        <i class="fa-solid fa-arrow-left"></i> Retour à la liste
                    </a>
                </div>
            </div>

</div>
</body>
</html>
