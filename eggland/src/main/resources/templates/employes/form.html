<!DOCTYPE html>
<html lang="fr" 
      xmlns:th="http://www.thymeleaf.org" 
      layout:decorate="~{fragments/layout}"> 

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvel employé - Eggland</title>
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <div layout:fragment="content">
        <div class="main">
            <div class="content">

                <div class="page-header">
                    <h2 th:text="${employe.id != null} ? 'Modifier l\'employé' : 'Nouvel employé'">Nouvel employé</h2>
                    <a th:href="@{/admin/employes}" class="btn btn-outline">
                        <i class="fa-solid fa-arrow-left"></i> Retour
                    </a>
                </div>

                <div class="alert-error" th:if="${erreur}" th:text="${erreur}">
                    Message d'erreur
                </div>

                <div class="card card-form">
                    <form th:action="${employe.id != null} ? @{/admin/employes/{id}/modifier(id=${employe.id})} : @{/admin/employes/nouveau}"
                          th:object="${employe}" method="post">

                        <div class="form-group">
                            <label>Nom</label>
                            <input type="text" th:field="*{nom}" placeholder="Dupont" required>
                        </div>
                        <div class="form-group">
                            <label>Prénom</label>
                            <input type="text" th:field="*{prenom}" placeholder="Jean" required>
                        </div>
                        <div class="form-group">
                            <label>Téléphone</label>
                            <input type="text" th:field="*{tel}" placeholder="+261 34 00 000 00">
                        </div>
                        <div class="form-group">
                            <label>Salaire mensuel (Ar)</label>
                            <input type="number" step="0.01" min="0" th:field="*{salaire}" placeholder="850000" required>
                        </div>
                        <div class="form-group">
                            <label>Date d'embauche</label>
                            <input type="date" th:field="*{dateEmbauche}" required>
                        </div>

                        <div class="form-actions">
                            <a th:href="@{/admin/employes}" class="btn btn-outline">Annuler</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fa-solid fa-check"></i> Enregistrer
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
