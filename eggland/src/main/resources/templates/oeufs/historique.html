<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{fragments/layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique des Œufs - Eggland</title>
    <link rel="stylesheet" th:href="@{/css/oeufs.css}">
    <link rel="stylesheet" th:href="@{/css/oeufs-stats.css}">
</head>

<body>
    <div layout:fragment="content" class="stats-page history-page">
        <div class="page-header">
            <div>
                <h2>Historique des Œufs</h2>
            </div>
            <div class="page-actions">
                <a th:href="@{/admin/oeufs}" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
                    Statistiques
                </a>
                <a th:href="@{/admin/oeufs/saisie}" class="btn btn-primary">
                    <i class="fa-solid fa-plus" aria-hidden="true"></i>
                    Nouvelle Collecte
                </a>
            </div>
        </div>

        <div class="history-filters">
            <form th:action="@{/admin/oeufs/historique}"
                method="get"
                class="filter-form">

                <div class="filter-group">
                    <label for="lotId">Lot</label>
                    <select id="lotId" name="lotId">
                        <option value="">Tous les lots</option>
                        <option th:each="lot : ${listeLots}"
                                th:value="${lot.id}"
                                th:text="|Lot ${lot.id}|"
                                th:selected="${lot.id == lotSelectionne}">
                        </option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="dateDebut">Du</label>
                    <input id="dateDebut"
                        type="date"
                        name="dateDebut"
                        th:value="${dateDebutSelectionnee}">
                </div>

                <div class="filter-group">
                    <label for="dateFin">Au</label>
                    <input id="dateFin"
                        type="date"
                        name="dateFin"
                        th:value="${dateFinSelectionnee}">
                </div>

                <input type="hidden" name="size" th:value="${pageSize}">

                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-filter"></i>
                    Filtrer
                </button>

                <a th:href="@{/admin/oeufs/historique}"
                    class="btn btn-secondary">
                    Réinitialiser
                </a>
            </form>
        </div>

        <div th:if="${error}" class="history-alert">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:text="${error}">Erreur</span>
        </div>

        <div th:if="${error == null and #lists.isEmpty(historiqueProduction)}" class="stats-empty">
            <i class="fa-solid fa-clock-rotate-left" aria-hidden="true"></i>
            <p>Aucun historique ne correspond aux filtres sélectionnés.</p>
        </div>

        <div th:if="${!#lists.isEmpty(historiqueProduction)}"
            class="table-responsive stats-table-card history-table-card">
            <div class="table-heading">
                <h3>Collectes enregistrées</h3>
                <span
                    th:text="|Page ${currentPage + 1}/${totalPages} - ${#lists.size(historiqueProduction)} ligne(s) affichée(s)|">0
                    ligne</span>
            </div>
            <table class="stats-table">
                <thead>
                    <tr>
                        <th>Lot</th>
                        <th>Date</th>
                        <th>Quantité</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${historiqueProduction}" th:with="productionId=${item['production_id']}">
                        <td th:text="${item['lot_id']}">1</td>
                        <td th:text="${item['date']}">2026-01-01</td>
                        <td>
                            <span class="quantity-pill" th:text="${item['quantite']}">0</span>
                        </td>
                        <td>
                            <span
                                th:classappend="${'valide'.equalsIgnoreCase(item['statut'])} ? 'status-pill' : 'status-anomaly'"
                                th:text="${item['statut']}">
                            </span>
                        </td>
                        <td>
                            <div class="history-actions" th:if="${productionId != null}">
                                <a th:href="@{/admin/oeufs/edit/{id}(id=${productionId})}"
                                    class="btn-action btn-modifier">
                                    <i class="fa-solid fa-pen"></i>
                                    Modifier
                                </a>
                                <form th:action="@{/admin/oeufs/delete}" method="post" class="history-delete-form"
                                    onsubmit="return confirm('Supprimer cette collecte ?')">
                                    <input type="hidden" name="id" th:value="${productionId}">
                                    <button type="submit" class="btn-action btn-supprimer">
                                        <i class="fa-solid fa-trash"></i>
                                        Supprimer
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div th:if="${totalPages > 1}" class="history-pagination">
                <a class="pagination-link" th:classappend="${currentPage == 0} ? ' disabled'"
                    th:href="${currentPage == 0} ? '#' : @{/admin/oeufs/historique(page=${currentPage - 1}, size=${pageSize}, lotId=${lotSelectionne}, dateDebut=${dateDebutSelectionnee}, dateFin=${dateFinSelectionnee})}">
                    Précédent
                </a>

                <div class="pagination-pages">
                    <a th:each="pageNumber : ${#numbers.sequence(0, totalPages - 1)}"
                        class="pagination-link pagination-number"
                        th:classappend="${pageNumber == currentPage} ? ' active'"
                        th:href="@{/admin/oeufs/historique(page=${pageNumber}, size=${pageSize}, lotId=${lotSelectionne}, dateDebut=${dateDebutSelectionnee}, dateFin=${dateFinSelectionnee})}"
                        th:text="${pageNumber + 1}">
                        1
                    </a>
                </div>

                <a class="pagination-link" th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
                    th:href="${currentPage + 1 >= totalPages} ? '#' : @{/admin/oeufs/historique(page=${currentPage + 1}, size=${pageSize}, lotId=${lotSelectionne}, dateDebut=${dateDebutSelectionnee}, dateFin=${dateFinSelectionnee})}">
                    Suivant
                </a>
            </div>
        </div>

    </div>
</body>

</html>
