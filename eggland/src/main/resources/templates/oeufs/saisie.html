<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${oeufProduction.id == null} ? 'Nouvelle collecte' : 'Modifier la collecte'">Production - Eggland</title>

    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/oeufs.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <div class="app">

        <div th:replace="fragments/sidebar :: sidebar"></div>

        <div class="main">

            <div th:replace="fragments/header :: header"></div>

            <div class="content">

                <div class="page-header">
                    <h2 th:text="${oeufProduction.id == null} ? 'Nouvelle collecte d\'œufs' : 'Modifier la collecte'"></h2>
                </div>

                <div class="alert alert-danger" th:if="${erreur}" th:text="${erreur}"></div>

                <div class="card-form">
                    <form th:action="@{/admin/oeufs/save}" th:object="${oeufProduction}" method="post">

                        <input type="hidden" th:field="*{id}" />

                        <div class="form-row">
                            <div class="form-group">
                                <label for="lot">Lot concerné</label>
                                <select id="lot" th:field="*{lot.id}" required>
                                    <option value="">-- Choisir un lot --</option>
                                    <option th:each="l : ${listeLots}" th:value="${l.id}" th:text="|Lot ${l.id}|"></option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="date">Date de collecte</label>
                                <input type="date" id="date" th:field="*{date}" th:max="${dateMax}" required />
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="quantite">Quantité totale produite</label>
                            <input type="number" id="quantite" th:field="*{quantite}" placeholder="Ex: 100" min="1" required />
                        </div>

                        <div class="section-title">Detail :</div>
                        <div class="section-desc">Renseignez uniquement les statuts constatées (casses, consommes, etc.)</div>

                        <div id="container-statuts">
                            <div class="statut-row" th:each="item, stat : *{oeufStatuts}">
                                <div class="form-group group-statut">
                                    <label class="small">Type de statut</label>
                                    <select th:field="*{oeufStatuts[__${stat.index}__].statut.id}">
                                        <option value="">-- Aucune statut --</option>
                                        <option th:each="st : ${listeStatuts}"
                                                th:value="${st.id}"
                                                th:text="${st.code}">
                                        </option>
                                    </select>
                                </div>

                                <div class="form-group group-quantite">
                                    <label class="small">Quantité</label>
                                    <input type="number" th:field="*{oeufStatuts[__${stat.index}__].quantite}" placeholder="0" min="1" />
                                </div>

                                <button type="button" class="btn-supprimer" onclick="supprimerLigne(this)">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </div>

                        <button type="button" class="btn-ajouter" onclick="ajouterLigne()">
                            <i class="fa-solid fa-plus"></i> Ajouter une statut
                        </button>

                        <div class="form-actions">
                            <button type="submit" class="btn-enregistrer">
                                <i class="fa-solid fa-save"></i> Enregistrer la collecte
                            </button>
                            <a th:href="@{/oeufs}" class="btn-annuler">
                                <i class="fa-solid fa-xmark"></i> Annuler
                            </a>
                        </div>

                    </form>
                </div>

            </div>

        </div>

    </div>

    <script th:inline="javascript">
        window.listeStatutsOeufs = /*[[${listeStatuts}]]*/ [];
    </script>
    <script th:src="@{/js/oeuf-saisie.js}"></script>
</body>

</html>
