<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Statistiques des Œufs - Eggland'">Statistiques - Eggland</title>

    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/oeufs.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <div class="app">

        <div th:replace="fragments/sidebar :: sidebar"></div>

        <div class="main">

            <div th:replace="fragments/header :: header"></div>

            <div class="content">

                <div class="page-header">
                    <h2>Statistiques des Œufs</h2>
                    <a th:href="@{/oeufs/saisie}" class="btn btn-primary">
                        <i class="fa-solid fa-plus"></i> Nouvelle Collecte
                    </a>
                </div>

                <div class="stats-container">
                    <h3>Stock disponible : <span th:text="${stock}">0</span> œufs</h3>
                </div>

                <div th:if="${#lists.isEmpty(tauxParLot)}" class="mt-3">
                    <p>Aucune production enregistrée pour le calcul de taux de ponte.</p>
                </div>

                <div th:if="${!#lists.isEmpty(tauxParLot)}" class="table-responsive mt-3">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Lot</th>
                                <th>Race</th>
                                <th>Date</th>
                                <th>Quantité valide</th>
                                <th>Attendu</th>
                                <th>Taux (%)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${tauxParLot}">
                                <td th:text="${item.lotNumero}">1</td>
                                <td th:text="${item.raceNom}">Race</td>
                                <td th:text="${item.date}">2026-01-01</td>
                                <td th:text="${item.quantiteValide}">0</td>
                                <td th:text="${#numbers.formatDecimal(item.attendu, 1, 'HALF_UP')}">0</td>
                                <td>
                                    <span th:text="${#numbers.formatDecimal(item.taux, 1, 'HALF_UP')} + '%'"
                                          th:classappend="${item.taux >= 90} ? ' text-success' : (item.taux >= 70 ? ' text-warning' : ' text-danger')">
                                    </span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

    </div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>

</body>

</html>
