<div class="header" th:fragment="header">

    <div class="page-title">
        <h1 th:text="${pageTitle ?: 'Eggland'}"></h1>
    </div>

    <div class="header-right">

        <form class="search-form" th:action="@{/search}" method="get">
            <input type="text" name="q" placeholder="Rechercher..." required />
            <button type="submit" class="btn-search">
                <i class="fa-solid fa-search"></i>
            </button>
        </form>

        <a th:href="@{/admin/clients}" style="position:relative; display:inline-flex; align-items:center; justify-content:center; width:40px; height:40px; border:none; border-radius:12px; background:var(--bg); cursor:pointer; text-decoration:none; color:inherit;">
            <i class="fa-solid fa-bell"></i>
            <span th:if="${nbClientsEnAttente > 0}" style="position:absolute; top:-2px; right:-2px; background:#e47373; color:#fff; font-size:10px; font-weight:700; min-width:18px; height:18px; border-radius:999px; display:flex; align-items:center; justify-content:center; padding:0 4px; box-shadow:0 2px 6px rgba(0,0,0,0.2);" th:text="${nbClientsEnAttente}">0</span>
        </a>

        <div class="user-info">
            <span>Admin</span>
        </div>

    </div>

</div>
