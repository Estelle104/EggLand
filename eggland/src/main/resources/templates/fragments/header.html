<div class="header" th:fragment="header">

    <div class="page-title">
        <h1 th:text="${pageTitle ?: 'Eggland'}"></h1>
    </div>

    <div class="header-right">

        <form class="search-form" th:action="@{/recherche}" method="get">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" name="q" placeholder="Rechercher..." required />
            <button type="submit" class="btn-search">
                <i class="fa-solid fa-search"></i>
            </button>
        </form>

        <div class="notification-dropdown">
            <button class="notification-btn" type="button" aria-expanded="false" aria-haspopup="true"
                aria-label="Notifications">
                <i class="fa-solid fa-bell"></i>
                <span class="notification-badge" th:if="${@notificationService.compterNonLues() > 0}"
                    th:text="${@notificationService.compterNonLues()}"></span>
            </button>
            <div class="notification-panel" role="menu">
                <div class="notification-header">
                    <h4>Notifications</h4>
                </div>
                <div class="notification-list">
                    <div th:each="notif : ${@notificationService.listerNonLues()}" class="notification-item"
                        role="menuitem">
                        <span class="notification-time"
                            th:text="${#temporals.format(notif.dateCreation, 'dd/MM/yyyy HH:mm')}"></span>
                        <span class="notification-message" th:text="${notif.message}"></span>
                    </div>
                    <div th:if="${@notificationService.compterNonLues() == 0}" class="notification-empty">Aucune
                        notification</div>
                </div>
            </div>
        </div>

    </div>

</div>
