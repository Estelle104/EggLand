<div th:fragment="pager(currentPage, totalPages, size, url)">
    <div style="display: flex; align-items: center; gap: 20px; justify-content: center; margin-top: 20px;">
        
        <form th:action="@{${url}}" method="get">
            <label>Lignes par page :</label>
            <select name="size" onchange="this.form.submit()">
                <option th:value="5" th:selected="${size == 5}">5</option>
                <option th:value="10" th:selected="${size == 10}">10</option>
                <option th:value="20" th:selected="${size == 20}">20</option>
            </select>
            <input type="hidden" name="page" value="0" />
        </form>

        <nav>
            <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
               th:href="@{${url}(page=${i}, size=${size})}"
               th:text="${i + 1}"
               th:style="${i == currentPage} ? 'font-weight:bold; color:red; padding: 5px;' : 'padding: 5px;'">
            </a>
        </nav>
    </div>
</div>
