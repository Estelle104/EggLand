<div th:fragment="pager(currentPage, totalPages, size, url)">
    <div style="display: flex; align-items: center; gap: 20px; justify-content: center; margin-top: 20px;">
        
        <form th:action="@{${url}}" method="get">
            <label>Lignes :</label>
            <select name="size" onchange="this.form.submit()">
                <option th:value="5" th:selected="${size == 5}">5</option>
                <option th:value="10" th:selected="${size == 10}">10</option>
                <option th:value="20" th:selected="${size == 20}">20</option>
            </select>
            <input type="hidden" name="page" value="0" />
        </form>

        <nav style="display: flex; gap: 10px;">
            <a th:if="${currentPage > 0}" 
               th:href="@{${url}(page=${currentPage - 1}, size=${size})}"
               style="padding: 8px 12px; background: #eee; border-radius: 5px; text-decoration: none; color: black;">
               « Précédent
            </a>

            <span style="align-self: center;">
                Page <span th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span>
            </span>

            <a th:if="${currentPage < totalPages - 1}" 
               th:href="@{${url}(page=${currentPage + 1}, size=${size})}"
               style="padding: 8px 12px; background: #eee; border-radius: 5px; text-decoration: none; color: black;">
               Suivant »
            </a>
        </nav>
    </div>
</div>
