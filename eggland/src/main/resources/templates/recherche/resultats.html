<!DOCTYPE html>
<html lang="fr" 
      xmlns:th="http://www.thymeleaf.org" 
      layout:decorate="~{fragments/layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Recherche - Eggland</title>
    <style>
        .page-header { margin-bottom: 24px; }
        .page-header h2 { color: var(--text); font-size: 22px; }
        .page-header .nb-resultats { color: var(--text-light); font-size: 14px; margin-top: 4px; }

        .card-section { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px; }
        .card-section h3 { color: var(--primary); font-size: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .card-section h3 .count { background: var(--bg); color: var(--text-light); font-size: 12px; padding: 2px 10px; border-radius: 10px; }

        .result-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-radius: 10px; transition: 0.2s; }
        .result-item:hover { background: rgba(184, 122, 42, 0.06); }
        .result-item .valeur { color: var(--text); font-size: 14px; font-weight: 500; }
        .result-item .colonne { color: var(--text-light); font-size: 12px; margin-left: 8px; }
        .result-item .btn-voir { background: var(--primary); color: white; padding: 6px 14px; border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: 600; transition: 0.2s; }
        .result-item .btn-voir:hover { background: var(--hover); }

        .result-item + .separator { border-top: 1px solid var(--border); margin: 0 8px; }

        .vide-message { text-align: center; padding: 60px; color: var(--text-light); }
        .vide-message i { font-size: 48px; margin-bottom: 16px; color: var(--border); }
        .vide-message p { font-size: 16px; }

        .icone-table { width: 20px; text-align: center; margin-right: 8px; color: var(--primary); }
    </style>
</head>

<body>
    <div layout:fragment="content">

                <div class="page-header">
                    <h2>Résultats pour "<span th:text="${query}"></span>"</h2>
                    <div class="nb-resultats" th:text="${totalResultats} + ' résultat(s) dans ' + ${nbCategories} + ' catégorie(s)'"></div>
                </div>

                <div th:if="${totalResultats == 0}">
                    <div class="card-section">
                        <div class="vide-message">
                            <i class="fa-solid fa-search"></i>
                            <p>Aucun résultat trouvé pour "<span th:text="${query}"></span>".</p>
                        </div>
                    </div>
                </div>

                <div th:each="entry : ${grouped}">
                    <div class="card-section">
                        <h3>
                            <span th:text="${#strings.capitalize(#strings.replace(entry.key, '_', ' '))}"></span>
                            <span class="count" th:text="${#lists.size(entry.value)} + ' résultat(s)'"></span>
                        </h3>

                        <div th:each="r : ${entry.value}" class="result-item">
                            <div>
                                <span class="valeur" th:text="${r.valeur()}"></span>
                                <span class="colonne" th:text="'(' + ${r.column()} + ')'"></span>
                            </div>
                            <!-- si r.url() n'est pas null le bouton "Voir" est affiché sinon le bouton n'est pas affiché -->
                            <a class="btn-voir" th:if="${r.url() != null}" th:href="@{${r.url()}}">
                                <i class="fa-solid fa-eye"></i> Voir
                            </a>
                        </div>
                    </div>
                </div>

        </div>
</body>
</html>
