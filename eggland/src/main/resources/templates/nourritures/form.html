<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${nourriture.id == null} ? 'Nouvelle nourriture' : 'Modifier la nourriture'">Nourriture - Eggland</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/nourritures.css}">
</head>

<body>
    <div class="app">
        <div th:replace="fragments/sidebar :: sidebar"></div>
        <div class="main">
            <div th:replace="fragments/header :: header"></div>
            <div class="content">

                <div class="page-header">
                    <h2 th:text="${nourriture.id == null} ? 'Nouvelle nourriture' : 'Modifier la nourriture'"></h2>
                </div>

                <div class="card-form">
                    <form th:action="@{/nourritures/save}" th:object="${nourriture}" method="post">

                        <input type="hidden" th:field="*{id}" />

                        <div class="form-group">
                            <label for="libelle">Libellé</label>
                            <input type="text" id="libelle" th:field="*{libelle}" placeholder="Ex: Maïs" required />
                        </div>
                        <div class="form-group">
                            <label for="prixUnitaire">Prix unitaire (Ar)</label>
                            <input type="number" id="prixUnitaire" th:field="*{prixUnitaire}" step="0.01" placeholder="Ex: 2000" required />
                        </div>
                        <div class="form-group">
                            <label for="seuilAlerte">Seuil d'alerte</label>
                            <input type="number" id="seuilAlerte" th:field="*{seuilAlerte}" placeholder="Ex: 50" />
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-enregistrer"><i class="fa-solid fa-save"></i> Enregistrer</button>
                            <a th:href="@{/nourritures}" class="btn-annuler"><i class="fa-solid fa-xmark"></i> Annuler</a>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
