<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nourritures - Eggland</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-header h2 { color: var(--text); font-size: 22px; }
        .btn-ajouter { background: var(--primary); color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-ajouter:hover { background: var(--hover); color: white; }
        .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 14px 12px; color: var(--text-light); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border); color: var(--text); font-size: 14px; }
        tr:hover td { background: rgba(184, 122, 42, 0.04); }
        .btn-action { padding: 6px 14px; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-modifier { background: #D8B77C; color: #33241A; margin-right: 6px; }
        .btn-modifier:hover { background: #c4a566; color: #33241A; }
        .btn-supprimer { background: #e47373; color: white; }
        .btn-supprimer:hover { background: #cc5a5a; color: white; }
        .vide-message { text-align: center; padding: 40px; color: var(--text-light); }
    </style>
</head>

<body>
    <div class="app">
        <div th:replace="fragments/sidebar :: sidebar"></div>
        <div class="main">
            <div th:replace="fragments/header :: header"></div>
            <div class="content">

                <div class="page-header">
                    <h2 th:text="${pageTitle}">Liste des nourritures</h2>
                    <a th:href="@{/nourritures/nouveau}" class="btn-ajouter"><i class="fa-solid fa-plus"></i> Nouvelle nourriture</a>
                </div>

                <div th:if="${error}" style="background:#f8d7da; color:#721c24; padding:12px 16px; border-radius:10px; margin-bottom:16px; font-size:14px;">
                    <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
                </div>

                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Libellé</th>
                                <th>Prix unitaire</th>
                                <th>Seuil alerte</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="n : ${nourritures}">
                                <td th:text="${n.id}"></td>
                                <td th:text="${n.libelle}"></td>
                                <td th:text="${#numbers.formatDecimal(n.prixUnitaire, 0, 'WHITESPACE', 2, 'COMMA')} + ' Ar'"></td>
                                <td th:text="${n.seuilAlerte}"></td>
                                <td>
                                    <a th:href="@{/nourritures/edit/{id}(id=${n.id})}" class="btn-action btn-modifier"><i class="fa-solid fa-pen"></i> Modifier</a>
                                    <a th:href="@{/nourritures/delete/{id}(id=${n.id})}" class="btn-action btn-supprimer" onclick="return confirm('Supprimer cette nourriture ?')"><i class="fa-solid fa-trash"></i> Supprimer</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${#lists.isEmpty(nourritures)}" class="vide-message">Aucune nourriture enregistrée.</div>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
