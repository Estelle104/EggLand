<!DOCTYPE html>
<html lang="fr" 
      xmlns:th="http://www.thymeleaf.org" 
      layout:decorate="~{fragments/layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nourritures - Eggland</title>
    <link rel="stylesheet" th:href="@{/css/nourritures.css}">
</head>

<body>
    <div layout:fragment="content">

                <div class="page-header">
                    <h2 th:text="${pageTitle}">Liste des nourritures</h2>
                    <a th:href="@{/admin/nourritures/nouveau}" class="btn-ajouter"><i class="fa-solid fa-plus"></i> Nouvelle nourriture</a>
                </div>

                <div th:if="${error}" style="background:#f8d7da; color:#721c24; padding:12px 16px; border-radius:10px; margin-bottom:16px; font-size:14px;">
                    <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
                </div>

                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Libellé</th>
                                <th>Prix unitaire</th>
                                <th>Seuil alerte</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="n : ${nourritures}">
                                <td th:text="${n.id}"></td>
                                <td th:text="${n.libelle}"></td>
                                <td th:text="${#numbers.formatDecimal(n.prixUnitaire, 0, 'WHITESPACE', 2, 'COMMA')} + ' Ar'"></td>
                                <td th:text="${n.seuilAlerte}"></td>
                                <td>
                                    <a th:href="@{/admin/nourritures/edit/{id}(id=${n.id})}" class="btn-action btn-modifier"><i class="fa-solid fa-pen"></i> Modifier</a>
                                    <a th:href="@{/admin/nourritures/delete/{id}(id=${n.id})}" class="btn-action btn-supprimer" onclick="return confirm('Supprimer cette nourriture ?')"><i class="fa-solid fa-trash"></i> Supprimer</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${#lists.isEmpty(nourritures)}" class="vide-message">Aucune nourriture enregistrée.</div>
                </div>

            </div>
</body>
</html>
