<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{fragments/layout}">
<head>
    <title>Dashboard - Eggland</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        .card { transition: transform 0.2s; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        .card-title { font-size: 0.875rem; font-weight: 600; color: #6c757d; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-value { font-size: 1.75rem; font-weight: 700; color: #212529; }
        .chart-container { height: 350px; position: relative; }
        .card-icon { font-size: 2rem; opacity: 0.15; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid py-4">
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card h-100 border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="card-title">Œufs du jour</div>
                            <div class="card-value text-warning" th:text="${#numbers.formatInteger(oeufsJour, 1, 'COMMA')}">0</div>
                        </div>
                        <i class="fa-solid fa-egg card-icon text-warning"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card h-100 border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="card-title">Stock disponible</div>
                            <div class="card-value text-primary" th:text="${#numbers.formatInteger(stockDisponible, 1, 'COMMA')}">0</div>
                        </div>
                        <i class="fa-solid fa-box card-icon text-primary"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card h-100 border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="card-title">Ventes du jour</div>
                            <div class="card-value text-success" th:text="${#numbers.formatDecimal(ventesJour, 1, 'COMMA', 2, 'POINT')} + ' Ar'">0 Ar</div>
                        </div>
                        <i class="fa-solid fa-cart-shopping card-icon text-success"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card h-100 border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="card-title">Bénéfice du mois</div>
                            <div class="card-value" th:text="${#numbers.formatDecimal(beneficeMois, 1, 'COMMA', 2, 'POINT')} + ' Ar'" th:classappend="${beneficeMois < 0} ? 'text-danger' : 'text-success'">0 Ar</div>
                        </div>
                        <i class="fa-solid fa-chart-line card-icon" th:classappend="${beneficeMois < 0} ? 'text-danger' : 'text-success'"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card h-100 border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="card-title">Livraisons en cours</div>
                            <div class="card-value text-info" th:text="${livraisonsEnCours}">0</div>
                        </div>
                        <i class="fa-solid fa-truck card-icon text-info"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card h-100 border-0">
                    <div class="card-header bg-white border-0 pb-0">
                        <h5 class="mb-0">Production d'œufs — 14 derniers jours</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="chartProduction"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 mb-4">
            <div class="card-header bg-white border-0">
                <h5 class="mb-0"><i class="fa-solid fa-skull me-2"></i>Mortalité</h5>
            </div>
            <div class="card-body">
                <form class="row g-3 align-items-end mb-4" th:action="@{/dashboard}" method="get">
                    <div class="col-md-3">
                        <label class="form-label small text-muted">Lot</label>
                        <select name="lotId" class="form-select form-select-sm">
                            <option value="">Tous les lots</option>
                            <option th:each="lot : ${lots}" th:value="${lot.id}" th:text="${'Lot ' + lot.id + ' - ' + (lot.race?.nom ?: '')}" th:selected="${lotIdSelectionne == lot.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small text-muted">Date début</label>
                        <input type="date" name="dateDebut" class="form-control form-control-sm" th:value="${dateDebutSelectionnee}">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small text-muted">Date fin</label>
                        <input type="date" name="dateFin" class="form-control form-control-sm" th:value="${dateFinSelectionnee}">
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-dark btn-sm w-100">Appliquer</button>
                    </div>
                </form>

                <div class="row g-4">
                    <div class="col-md-5">
                        <div class="chart-container" style="height: 280px;">
                            <canvas id="chartMortalite"></canvas>
                        </div>
                    </div>
                    <div class="col-md-7 d-flex flex-column justify-content-center">
                        <div class="d-flex gap-4 mb-3">
                            <div class="text-center p-3 rounded" style="background: #fce4e4; flex: 1;">
                                <div class="small text-muted">Morts</div>
                                <div class="fw-bold fs-4 text-danger" th:text="${#numbers.formatInteger(totalMorts, 1, 'COMMA')}">0</div>
                            </div>
                            <div class="text-center p-3 rounded" style="background: #e4fce4; flex: 1;">
                                <div class="small text-muted">Vivants</div>
                                <div class="fw-bold fs-4 text-success" th:text="${#numbers.formatInteger(totalVivants, 1, 'COMMA')}">0</div>
                            </div>
                            <div class="text-center p-3 rounded" style="background: #f0f0f0; flex: 1;">
                                <div class="small text-muted">Total initial</div>
                                <div class="fw-bold fs-4" th:text="${#numbers.formatInteger(totalMorts + totalVivants, 1, 'COMMA')}">0</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const labels = /*[[${production14Jours.labels}]]*/ [];
        const quantites = /*[[${production14Jours.quantites}]]*/ [];

        const ctx = document.getElementById('chartProduction').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Œufs produits',
                    data: quantites,
                    borderColor: '#DAAB3A',
                    backgroundColor: 'rgba(218, 171, 58, 0.15)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: '#DAAB3A'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => ctx.parsed.y + ' œufs'
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { callback: value => Number.isInteger(value) ? value : '' }
                    }
                }
            }
        });

        const totalMorts = /*[[${totalMorts}]]*/ 0;
        const totalVivants = /*[[${totalVivants}]]*/ 0;

        const ctx2 = document.getElementById('chartMortalite').getContext('2d');
        new Chart(ctx2, {
            type: 'pie',
            data: {
                labels: ['Morts', 'Vivants'],
                datasets: [{
                    data: [totalMorts, totalVivants],
                    backgroundColor: ['#dc3545', '#28a745'],
                    borderWidth: 2,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { font: { size: 13 }, padding: 16 }
                    },
                    tooltip: {
                        callbacks: {
                            label: ctx => {
                                const total = totalMorts + totalVivants;
                                const pct = total > 0 ? ((ctx.parsed / total) * 100).toFixed(1) : 0;
                                return ctx.label + ': ' + ctx.parsed + ' (' + pct + '%)';
                            }
                        }
                    }
                }
            }
        });
    </script>
</div>
</body>
</html>
