<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{fragments/layout}">
<head>
    <title>Dashboard - Eggland</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        .card { transition: transform 0.2s; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        .card-title { font-size: 0.875rem; font-weight: 600; color: #6c757d; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-value { font-size: 1.75rem; font-weight: 700; color: #212529; }
        .chart-container { height: 350px; position: relative; }
        .card-icon { font-size: 2rem; opacity: 0.15; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid py-4">
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card h-100 border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="card-title">Œufs du jour</div>
                            <div class="card-value text-warning" th:text="${#numbers.formatDecimal(oeufsJour, 0, 'COMMA', 0, 'POINT')}">0</div>
                        </div>
                        <i class="fa-solid fa-egg card-icon text-warning"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card h-100 border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="card-title">Stock disponible</div>
                            <div class="card-value text-primary" th:text="${#numbers.formatDecimal(stockDisponible, 0, 'COMMA', 0, 'POINT')}">0</div>
                        </div>
                        <i class="fa-solid fa-box card-icon text-primary"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card h-100 border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="card-title">Ventes du jour</div>
                            <div class="card-value text-success" th:text="${#numbers.formatDecimal(ventesJour, 0, 'COMMA', 2, 'POINT')} + ' Ar'">0 Ar</div>
                        </div>
                        <i class="fa-solid fa-cart-shopping card-icon text-success"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card h-100 border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="card-title">Bénéfice du mois</div>
                            <div class="card-value" th:text="${#numbers.formatDecimal(beneficeMois, 0, 'COMMA', 2, 'POINT')} + ' Ar'" th:classappend="${beneficeMois < 0} ? 'text-danger' : 'text-success'">0 Ar</div>
                        </div>
                        <i class="fa-solid fa-chart-line card-icon" th:classappend="${beneficeMois < 0} ? 'text-danger' : 'text-success'"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card h-100 border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="card-title">Livraisons en cours</div>
                            <div class="card-value text-info" th:text="${livraisonsEnCours}">0</div>
                        </div>
                        <i class="fa-solid fa-truck card-icon text-info"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card h-100 border-0">
                    <div class="card-header bg-white border-0 pb-0">
                        <h5 class="mb-0">Production d'œufs — 14 derniers jours</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="chartProduction"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const labels = /*[[${production14Jours.labels}]]*/ [];
        const quantites = /*[[${production14Jours.quantites}]]*/ [];

        const ctx = document.getElementById('chartProduction').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Œufs produits',
                    data: quantites,
                    borderColor: '#DAAB3A',
                    backgroundColor: 'rgba(218, 171, 58, 0.15)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: '#DAAB3A'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => ctx.parsed.y + ' œufs'
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { callback: value => Number.isInteger(value) ? value : '' }
                    }
                }
            }
        });
    </script>
</div>
</body>
</html>
