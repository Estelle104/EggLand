<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{client/espace/layout}">
<head>
    <title>Mes livraisons</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card-client">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0"><i class="fa-solid fa-truck me-2"></i>Mes livraisons</h5>
        </div>
        <div class="table-responsive">
            <table class="table table-hover table-client mb-0">
                <thead>
                    <tr>
                        <th>N°</th>
                        <th>Date</th>
                        <th>Adresse</th>
                        <th>Frais</th>
                        <th>Statut</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="liv : ${livraisons}">
                        <td th:text="${liv.id}">1</td>
                        <td th:text="${liv.dateLivraison}">01/01/2026</td>
                        <td th:text="${liv.adresseLivraison}">Adresse</td>
                        <td th:text="${#numbers.formatDecimal(liv.fraisLivraison, 0, 'COMMA', 2, 'POINT')} + ' Ar'">0 Ar</td>
                        <td>
                            <span class="badge-statut" th:text="${liv.statut.code}"
                                  th:classappend="${liv.statut.code == 'livre'} ? 'bg-success text-white' : 
                                                  (${liv.statut.code == 'en_cours'} ? 'bg-info text-white' : 
                                                  (${liv.statut.code == 'en_attente'} ? 'bg-warning text-dark' : 'bg-secondary text-white'))">
                                en_attente
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${livraisons.isEmpty()}">
                        <td colspan="5" class="text-center text-muted py-4">Aucune livraison pour le moment</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
