<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Eggland">Mon espace</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        :root {
            --bg-cream: #F2EDDB;
            --brown: #683516;
            --accent: #DAAB3A;
        }
        body {
            background: #f5f3ee;
            font-family: system-ui, sans-serif;
        }
        .client-navbar {
            background: var(--brown);
            color: white;
            padding: 0.75rem 1.5rem;
        }
        .client-navbar .navbar-brand {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.4rem;
        }
        .client-navbar .nav-link {
            color: rgba(255,255,255,0.85) !important;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .client-navbar .nav-link:hover {
            background: rgba(255,255,255,0.15);
            color: white !important;
        }
        .page-container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .card-client {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card-client h5 {
            color: var(--brown);
            font-weight: 600;
        }
        .table-client th {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6c757d;
        }
        .badge-statut {
            padding: 0.35rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <nav class="client-navbar d-flex align-items-center justify-content-between">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/client/espace/commandes}">
            <i class="fa-solid fa-egg"></i> EGGLAND
        </a>
        <div class="d-flex align-items-center gap-2">
            <a class="nav-link" th:href="@{/client/espace/commandes}">
                <i class="fa-solid fa-receipt me-1"></i>Commandes
            </a>
            <a class="nav-link" th:href="@{/client/espace/livraisons}">
                <i class="fa-solid fa-truck me-1"></i>Livraisons
            </a>
            <a class="nav-link" th:href="@{/client/espace/profil}">
                <i class="fa-solid fa-user me-1"></i>Profil
            </a>
            <span class="text-white-50 mx-1">|</span>
            <span class="text-white small me-2" th:text="${client.email}">email</span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button class="btn btn-sm btn-outline-light">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </form>
        </div>
    </nav>

    <div class="page-container">
        <main layout:fragment="content"></main>
    </div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
