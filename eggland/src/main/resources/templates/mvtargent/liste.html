<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouvements d'argent - Eggland</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        .page-header { margin-bottom: 24px; }
        .page-header h2 { color: var(--text); font-size: 22px; }
        .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 14px 12px; color: var(--text-light); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border); color: var(--text); font-size: 14px; }
        tr:hover td { background: rgba(184, 122, 42, 0.04); }
        .badge-type { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-entree { background: #d4edda; color: #155724; }
        .badge-sortie { background: #f8d7da; color: #721c24; }
        .montant-positif { color: #155724; font-weight: 600; }
        .montant-negatif { color: #721c24; font-weight: 600; }
        .vide-message { text-align: center; padding: 40px; color: var(--text-light); }
    </style>
</head>

<body>
    <div class="app">
        <div th:replace="fragments/sidebar :: sidebar"></div>
        <div class="main">
            <div th:replace="fragments/header :: header"></div>
            <div class="content">

                <div class="page-header">
                    <h2 th:text="${pageTitle}">Mouvements d'argent</h2>
                </div>

                <div class="card">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Montant</th>
                                <th>Catégorie</th>
                                <th>Référence</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="m : ${mouvements}">
                                <td th:text="${#temporals.format(m.date, 'dd/MM/yyyy')}"></td>
                                <td>
                                    <span class="badge-type" th:class="${m.type.code == 'entree'} ? 'badge-type badge-entree' : 'badge-type badge-sortie'"
                                          th:text="${m.type.code == 'entree'} ? 'Entrée' : 'Sortie'"></span>
                                </td>
                                <td th:text="${#numbers.formatDecimal(m.montant, 0, 'WHITESPACE', 2, 'COMMA')} + ' Ar'"
                                    th:class="${m.type.code == 'entree'} ? 'montant-positif' : 'montant-negatif'"></td>
                                <td th:text="${m.categorie}"></td>
                                <td th:text="${m.reference}"></td>
                            </tr>
                        </tbody>
                    </table>

                    <div th:if="${#lists.isEmpty(mouvements)}" class="vide-message">
                        Aucun mouvement d'argent.
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
